 building_yuzu_ancient_cryo_chamber_2_desc:0"这个巨大的装置靠着神秘的原理自行运转，内部挂着一排排的冷冻荚仓，里面装着约百亿具冷冻的克隆体，她们虽然陷入沉眠，但在神奇的设备的支持下仍能够在梦境中遨游。"
