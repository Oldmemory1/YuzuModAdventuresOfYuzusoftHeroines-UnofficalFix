l_simp_chinese:

 building_yuzu_clone_vats:0"原始克隆仓"
 building_yuzu_clone_vats_desc:0"克隆仓建造者遗留下来的遗失科技，分解简单的材料，并用以组装有机人口。这个建筑利用了让人意想不到的技术，虽然原始，但却十分高效。"
 tooltip_only_yuzu_assembly:0"该建筑只能组装柚子类人口。"

 building_yuzu_cafe:0"星光咖啡馆"
 building_yuzu_cafe_desc:0"四季夏目在这个星球上规划开张的咖啡馆，由于经费的充足，建设得要比原世界的更加豪华，能够满足庞大的人流量。"
 building_yuzu_cafe_global:0"星光咖啡馆全球连锁店"
 building_yuzu_cafe_global_desc:0"单独的咖啡馆已经不能满足日益发展的整个星球的需要了，现在全球都开设了星光咖啡馆的连锁店。"

 job_cafe_clerk:0"咖啡馆员工"
 job_cafe_clerk_plural:0"咖啡馆员工"
 job_cafe_clerk_desc:0"星光咖啡馆的员工，负责制作食品以及接待顾客。"
 job_cafe_clerk_effect_desc:0"£job_cafe_clerk£$job_cafe_clerk_plural$将£food£§Y$food$§!转化为$r_amenities$、 £mod_trade_value_add£ §Y$TRADE_VALUE$§!和£unity£ §Y$unity$§!"
 mod_job_cafe_clerk_add:0"$job_cafe_clerk$岗位"
 mod_job_cafe_clerk_per_pop:0 "每$VALUE$个人口提供§G+1§!个$job_cafe_clerk$岗位"
 mod_job_cafe_clerk_per_pop_short:0 "\n每$VALUE$ £pop£ §G+1§! £mod_job_cafe_clerk_add£ "
 planet_cafe_clerks:0 "咖啡馆员工岗位"


 building_yuzu_supernatural_research_organization:0"超自然研究部"
 building_yuzu_supernatural_research_organization_desc:0"在这个星球上重新建立的超自然研究部，负责研究各种超自然现象，也保留了帮助他人解决烦恼的功能，同时也会有魔女负责收集心之碎片。"
 building_yuzu_supernatural_research_institute:0"超自然研究所"
 building_yuzu_supernatural_research_institute_desc:0"来到这个世界以后，我们发现的超自然现象要比原世界更多，局限于社团形式的研究已经不能满足我们的需要了，我们需要更加专业化的研究所。研究所保留了帮助他人解决麻烦的功能，同时也会有魔女负责收集心之碎片。"
 building_yuzu_supernatural_research_center:0"超自然研究中心"
 building_yuzu_supernatural_research_center_desc:0"随着超自然研究规模的不断增加，我们需要建立一座超自然研究中心来协助整个星球的研究。研究中心保留了帮助他人解决麻烦的功能，同时也会有魔女负责收集心之碎片。"

 job_supernatural_researcher:0"超自然研究员"
 job_supernatural_researcher_plural:0"超自然研究员"
 job_supernatural_researcher_desc:0"研究超自然现象的研究员，有时也会帮助他人解决烦恼。"
 job_supernatural_researcher_effect_desc:0"£job_supernatural_researcher£$job_supernatural_researcher_plural$将£consumer_goods£§Y$consumer_goods$§!转化为$r_research$、$r_amenities$和£unity£ §Y$unity$§!"
 mod_job_supernatural_researcher_add:0"$job_supernatural_researcher$岗位"
 mod_job_supernatural_researcher_per_pop:0 "每$VALUE$个人口提供§G+1§!个$job_supernatural_researcher$岗位"
 mod_job_supernatural_researcher_per_pop_short:0 "\n每$VALUE$ £pop£ §G+1§! £mod_job_researcher_add£ "

 job_yuzu_witch:0"魔女"
 job_yuzu_witch_plural:0"魔女"
 job_yuzu_witch_desc:0"通过帮助他人解决烦恼来收集心之碎片的魔女。"
 job_yuzu_witch_effect_desc:0"£job_yuzu_witch£$job_yuzu_witch_plural$消耗£consumer_goods£§Y$consumer_goods$§!，收集£fragment_of_heart£§Y$fragment_of_heart$§!并产生$r_amenities$和£unity£ §Y$unity$§!"
 mod_job_yuzu_witch_add:0"$job_yuzu_witch$岗位"
 mod_job_yuzu_witch_per_pop:0 "每$VALUE$个人口提供§G+1§!个$job_yuzu_witch$岗位"
 mod_job_yuzu_witch_per_pop_short:0 "\n每$VALUE$ £pop£ §G+1§! £mod_job_yuzu_witch_add£ "
 planet_yuzu_witches:0"魔女岗位"
 YUZU_WITCH_JOB_TRIGGER:0"这个岗位仅能由柚子大类的人口从事。"


 yuzu_fe_building_failtext:0"§R需要从§!§Y法令（愿望）§!§R中获取§!"

 building_yuzu_nourishment_center:0 "营养圣殿"
 building_yuzu_nourishment_center_desc:0 "只要是有味道的东西，这里就能迅速重现出来。"


 building_yuzu_nano_forge:0 "混沌熔炉"
 building_yuzu_nano_forge_desc:1 "巨型真空混沌熔炼装置将原材料高效地转化为拥有奇迹般效能的高端合金。"


 building_yuzu_dimensional_fabricator:0 "多重次元制造机"
 building_yuzu_dimensional_fabricator_desc:0 "这座建筑利用闻所未闻的多重次元重叠科技，从多个异世界吸取大量宝贵的资源。"


 building_yuzu_affluence_center:0 "财富圣殿"
 building_yuzu_affluence_center_desc:0 "无论多奇特的材料，都可以在这里迅速找到。"


 building_yuzu_class_4_singularity:0 "五级奇点"
 building_yuzu_class_4_singularity_desc:0 "运用了无人能够理解的奇点技术制作的全自动发电站，超大型隔离场中源源不断地产生着能量。"


 building_yuzu_master_archive:0 "神秘档案库"
 building_yuzu_master_archive_desc:0 "这里存储着不知多少个星系纪元的知识集合，但操作该档案库并调出系统数据的方法无人知晓。在这种情况下，从这里提取出的一点一滴的信息都是无价之宝。"

 job_yuzu_fe_archivist:0 "神秘档案管理员"
 job_yuzu_fe_archivist_plural:0 "神秘档案管理员"
 job_yuzu_fe_archivist_desc:1 "神秘档案管理员争取将每一个数据碎片都按照严格的标准分类与排列清楚。"
 job_yuzu_fe_archivist_effect_desc:0"£job_yuzu_fe_archivist£$job_yuzu_fe_archivist_plural$产生$r_research$"
 mod_job_yuzu_fe_archivist_add:0 "$job_yuzu_fe_archivist$岗位"


 building_yuzu_empyrean_shrine:0 "苍穹神龛"
 building_yuzu_empyrean_shrine_desc:0 "神龛本身会发出振动，这使得如果在一定距离之外观察的话就会发现神龛变得些许模糊了，似乎处在另一个位面。"

 job_yuzu_fe_augur:0 "虚境圣使"
 job_yuzu_fe_augur_plural:0 "虚境圣使"
 job_yuzu_fe_augur_desc:1 "它在说话，却不发出任何声音。要想完全理解它所想表达的意思，首先你得让自己游走于危险的峭壁之上，然后找寻那飘渺的痕迹。"
 job_yuzu_fe_augur_effect_desc:0"£job_yuzu_fe_augur£$job_yuzu_fe_augur_plural$产生£unity£ §Y$unity$§!"
 mod_job_yuzu_fe_augur_add:0 "$job_yuzu_fe_augur$岗位"


 building_yuzu_fe_dome:0 "覆天穹顶"
 building_yuzu_fe_dome_desc:0 "依托极度先进的反重力科技漂浮在空中的超级乌托邦。从地面望去，它几乎覆盖了整个天空。"


 building_yuzu_fe_stronghold:0 "圣盾基地"
 building_yuzu_fe_stronghold_desc:0 "一座巨大的星球防御基地，拥有多个装满上古神秘武器的军械库。"

 job_yuzu_fe_protector:0 "守护者"
 job_yuzu_fe_protector_plural:0 "守护者"
 job_yuzu_fe_protector_desc:2 "这些装备精良的军人会平定一切扰乱星球秩序的因素，无论内外。"
 job_yuzu_fe_protector_effect_desc:0"£job_yuzu_fe_protector£ $job_yuzu_fe_protector_plural$降低 £crime£ §Y$PLANET_CRIME_TITLE$§!并产生£mod_country_naval_cap_add£ §Y$MOD_COUNTRY_NAVAL_CAP_ADD$§!、£defense_army£ §Y防御部队§!和£stability£§Y稳定度§!"
 mod_job_yuzu_fe_protector_add:0 "$job_yuzu_fe_protector$岗位"


 building_yuzu_fe_xeno_zoo:0 "外星庇护所"
 building_yuzu_fe_xeno_zoo_desc:0 "一个为异种生物提供自然栖息地的高度复杂的庇护所，运用了让人完全无法理解的空间折叠技术，内部蕴含多重空间。异种生物可以在这里得到正常生活所需的一切。"
 building_yuzu_fe_xeno_zoo_tooltip:0"为星球上所有拥有居留权的非机械物种提供$job_yuzu_fe_xeno_ward$岗位"

 job_yuzu_fe_xeno_keeper:0 "庇护所监护者"
 job_yuzu_fe_xeno_keeper_plural:0 "庇护所监护者"
 job_yuzu_fe_xeno_keeper_desc:0 "这些监护者负责照顾其管辖的异种监护区。"
 job_yuzu_fe_xeno_keeper_effect_desc:0"£job_yuzu_fe_xeno_keeper£ $job_yuzu_fe_xeno_keeper_plural$降低 £crime£ §Y$PLANET_CRIME_TITLE$§!并产生$r_amenities$和 £defense_army£ §Y防御部队§!"
 mod_job_yuzu_fe_xeno_keeper_add:0 "$job_yuzu_fe_xeno_keeper$岗位"
 YUZU_FE_XENO_KEEPER_JOB_TRIGGER:0"这个岗位仅能由我们帝国的主体物种的人口从事。"

 job_yuzu_fe_xeno_ward:1 "庇护所收容使"
 job_yuzu_fe_xeno_ward_plural:2 "庇护所收容使"
 job_yuzu_fe_xeno_ward_desc:1 "这些生物标本被运送来这个宜居的生态环境中生活，以确保其物种得以在这个混乱而危险的宇宙中延续下去。他们的自由并没有受到严格限制，经过申请并被批准后可以在星球范围内临时离开外星庇护所。"
 job_yuzu_fe_xeno_ward_effect_desc:0"£job_yuzu_fe_xeno_ward£$job_yuzu_fe_xeno_ward_plural$能将 £consumer_goods£ §Y$consumer_goods$§! 转变为 £unity£ §Y$unity$§!"
 mod_job_yuzu_fe_xeno_ward_add:0 "$job_yuzu_fe_xeno_ward$岗位"
 pop_category_yuzu_xeno_ward:0 "保护物种生活标准"
 pop_cat_yuzu_xeno_ward:0 "保护物种"
 pop_cat_yuzu_xeno_ward_plural:0 "保护物种"
 mod_pop_cat_yuzu_xeno_ward_political_power:0 "$pop_cat_yuzu_xeno_ward$政治权力"
 mod_pop_cat_yuzu_xeno_ward_happiness:0 "$pop_cat_yuzu_xeno_ward$幸福度"
 pop_cat_yuzu_xeno_ward_desc:0 "这些保护物种大多数时间都生活在一个完美复制其原生环境的保留地中。"


 building_yuzu_ancient_cryo_chamber_1:0"神秘冷冻室"
 building_yuzu_ancient_cryo_chamber_1_desc:0"这个巨大的装置靠着神秘的原理自行运转，内部挂着一排排的冷冻荚仓，里面装着数十亿具冷冻的克隆体，她们虽然陷入沉眠，但在神奇的设备的支持下仍能够在梦境中遨游。"
