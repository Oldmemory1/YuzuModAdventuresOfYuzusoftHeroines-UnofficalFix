l_simp_chinese:

 tech_yuzu_city:0"理想城建设"
 tech_yuzu_city_desc:0"通过对深渊教廷那极其壮阔的都市星球的研究分析，现在我们也能迅速地完成工程量庞大的理想城建设。"
 TECH_YUZU_CITY_TITLE:0"§H解锁决议：§!重建理想城\n§H解锁决议：§!建设理想城"
 TECH_YUZU_CITY_DESC:0"通过对深渊教廷那极其壮阔的都市星球的研究分析，现在我们也能迅速地完成工程量庞大的理想城建设。"

 tech_yuzu_restore_abyss_city:0"重建深渊之城"
 tech_yuzu_restore_abyss_city_desc:0"通过对深渊教廷典籍的研究，我们现在可以通过对城市的改造处理从深渊之门释放出的深渊之息，并将其引入星球的每一个角落，提升我们的生产效率——也就是重建深渊之城。"
 TECH_YUZU_RESTORE_ABYSS_CITY_TITLE:0"§H解锁决议：§!重建深渊之城"
 TECH_YUZU_RESTORE_ABYSS_CITY_DESC:0"通过对深渊教廷典籍的研究，我们现在可以通过对城市的改造处理从深渊之门释放出的深渊之息，并将其引入星球的每一个角落，提升我们的生产效率——也就是重建深渊之城。"

 tech_yuzu_abyss_city:0"深渊之城"
 tech_yuzu_abyss_city_desc:0"通过对深渊之门的研究，我们现在终于可以对它进行一定程度上的仿制，从而建设属于我们自己的深渊之城。"
 TECH_YUZU_ABYSS_CITY_TITLE:0"§H解锁决议：§!建设深渊之城"
 TECH_YUZU_ABYSS_CITY_DESC:0"通过对深渊之门的研究，我们现在终于可以对它进行一定程度上的仿制，从而建设属于我们自己的深渊之城。"

 tech_yuzu_sunset_city:0"夕阳之城"
 tech_yuzu_sunset_city_desc:0"随着我们对禁忌知识了解得越来越深，我们已经可以对深渊教廷的技术进行改造。幻梦境——潜意识与想像力构成的平行空间，我们通过梦境之门将其投影于自身所在的星球，可以轻松地出入梦境与现实，带来全新的工作和生活方式。"
 TECH_YUZU_SUNSET_CITY_TITLE:0"§H解锁决议：§!建设夕阳之城"
 TECH_YUZU_SUNSET_CITY_DESC:0"随着我们对禁忌知识了解得越来越深，我们已经可以对深渊教廷的技术进行改造。幻梦境——潜意识与想像力构成的平行空间，我们通过梦境之门将其投影于自身所在的星球，可以轻松地出入梦境与现实，带来全新的工作和生活方式。"


 pc_yuzu_abyss_city:0"深渊之城"
 pc_yuzu_abyss_city_desc:0"整个星球都被都市与工业集群覆盖，并利用深渊之息辅助生产。从太空中已经无法辨认其地壳的自然形态了。"
 pc_yuzu_sunset_city:0"夕阳之城"
 pc_yuzu_sunset_city_desc:0"整个星球都被都市与工业集群覆盖，并与幻梦境中的自身的投影重叠。从太空中已经无法辨认其地壳的自然形态了。"


 decision_yuzu_arcology_project:0 "建设理想城"
 decision_yuzu_arcology_project_desc:1 "无边无际的理想城覆盖了行星上的每一个角落，形成一个环球都会，一个普世之城。"
 decision_yuzu_arcology_project_relic:0 "重建理想城"
 decision_yuzu_arcology_project_relic_desc:0 "这颗行星曾经是一个充满生机的都市星球。重建星球的任务十分艰巨，但我们可以恢复其往日的辉煌。"
 decision_restore_yuzu_abyss_city:0"重建深渊之城"
 decision_restore_yuzu_abyss_city_desc:0"这颗行星曾经是一个借由深渊之息运转的深渊之城。重建深渊之城的任务十分艰巨，但我们可以恢复其往日的辉煌。"
 decision_restore_yuzu_abyss_city_effects:1 "将星球变成§Y深渊之城§!，增加§Y资源生产§!和§Y有机人口组装速度§!并解锁特殊的 £district£ §Y深渊之城区划§!，但会增加§Y$mod_planet_pops_consumer_goods_upkeep_mult$§!并降低§Y人口增长速度§!。"
 decision_yuzu_abyss_city:0"建设深渊之城"
 decision_yuzu_abyss_city_desc:0"通过建造深渊之门的仿制品，我们可以建设属于我们自己的深渊之城。"
 decision_yuzu_abyss_city_effects:1 "将星球变成§Y深渊之城§!，增加§Y资源生产§!和§Y有机人口组装速度§!并解锁特殊的 £district£ §Y深渊之城区划§!，但会增加§Y$mod_planet_pops_consumer_goods_upkeep_mult$§!并降低§Y人口增长速度§!。"
 decision_yuzu_sunset_city:0"建设夕阳之城"
 decision_yuzu_sunset_city_desc:0"通过建造梦境之门，我们可以将幻梦境投影于这个星球，从而轻松地出入梦境与现实，带来全新的工作和生活方式。"
 decision_yuzu_sunset_city_effects:1 "将星球变成§Y夕阳之城§!，增加§Y资源生产§!，§Y人口增长§!和§Y有机人口组装速度§!并解锁特殊的 £district£ §Y夕阳之城区划§!。"

 
 district_yuzu_city_housing:0 "居住理想城"
 district_yuzu_city_housing_plural:0 "居住理想城"
 district_yuzu_city_housing_desc:0 "这些特殊的巨城区划利用整合式垂直建筑，可实现地表面积人口密度最大化。"
 district_yuzu_city_industry:1 "工业理想城"
 district_yuzu_city_industry_plural:1 "工业理想城"
 district_yuzu_city_industry_desc:0 "这座区划的阶层街道两侧布满了冶炼设施和工厂，熔炉的嘶吼与铸造厂的哐铛声在里面不断回响。"
 district_yuzu_city_administrative:0 "行政理想城"
 district_yuzu_city_administrative_plural:0 "行政理想城"
 district_yuzu_city_administrative_desc:0 "成群结队的行政文员和官僚们甘做牛马，以满足一个正在扩张的官僚体系不断提出的全新要求。"
 district_yuzu_city_religious:0 "教会理想城"
 district_yuzu_city_religious_plural:0 "教会理想城"
 district_yuzu_city_religious_desc:0 "这些尖塔是我们信仰虔敬的真鉴与实证，关乎我们整个帝国的精神福祉。"
 district_yuzu_city_refinery:0"精炼理想城"
 district_yuzu_city_refinery_plural:0"精炼理想城"
 district_yuzu_city_refinery_desc:0"这座区划布满了由各种先进的精炼设施所组成的工业网络，日日夜夜马不停蹄地生产出大量稀有资源。"
 district_yuzu_city_dream:0"梦境区划"
 district_yuzu_city_dream_plural:0"梦境区划"
 district_yuzu_city_dream_desc:0"这座区划并不存在于现实，而是存在于幻梦境中。在这片丰饶而广袤的梦境世界里，各种建筑设施产出着大量基础资源。"
 

 col_yuzu_city_capital:0 "帝国首都"
 col_yuzu_city_capital_desc:0 "星际帝国的首都星球上面充斥着政府建筑、办公室及代理服务机构的高楼大厦。"
 col_yuzu_city_capital_machine:0 "机械首都"
 col_yuzu_city_capital_machine_desc:1 "机械智能政体的都城行星是中央网络意识的集中点，所有单位和人口的工作分配和管理事务都是集中于此处。"
 col_yuzu_city_capital_hive:0 "蜂巢首都"
 col_yuzu_city_capital_hive_desc:1 "蜂巢思维政体的都城行星是集体意识的中心点，集体意识的所有想法和行动都是源自于此处。"
 col_yuzu_city_mix:0"都市星球"
 col_yuzu_city_mix_desc:0 "这个都市星球尚未针对任一产业进行特化。"
 col_yuzu_city_industrial:0 "工业型都市星球"
 col_yuzu_city_industrial_desc:0 "规模庞大的行星城市群，同时生产合金和消费品。"
 col_yuzu_city_foundry:0 "铸造型都市星球"
 col_yuzu_city_foundry_desc:0 "规模庞大的行星城市群，为时刻不停地生产合金进行了特化改造。"
 col_yuzu_city_foundry_custom:1 "如果可能的话，§Y工业理想城§!会将一个消费品生产岗位转变为一个合金生产岗位。\n\n"
 col_yuzu_city_factory:1 "工厂型都市星球"
 col_yuzu_city_factory_desc:0 "规模庞大的行星城市群，为时刻不停地生产消费品进行了特化改造。"
 col_yuzu_city_factory_custom:1 "如果可能的话，§Y工业理想城§!会将一个合金生产岗位转变为一个消费品生产岗位。\n\n"
 col_yuzu_city_refinery:0"精炼型都市星球"
 col_yuzu_city_refinery_desc:0"规模庞大的行星城市群，为生产各种稀有资源进行了特化改造。"
 col_yuzu_city_exotic_gases:0"气体精炼型都市星球"
 col_yuzu_city_exotic_gases_desc:0"规模庞大的行星城市群，为时刻不停地精炼异星天然气进行了特化改造。"
 col_yuzu_city_exotic_gases_custom:1 "如果可能的话，§Y精炼理想城§!会将一个稀有水晶生产岗位和一个易爆微粒生产岗位转变为两个异星天然气生产岗位。\n\n"
 col_yuzu_city_rare_crystals:0"水晶合成型都市星球"
 col_yuzu_city_rare_crystals_desc:0"规模庞大的行星城市群，为时刻不停地合成稀有水晶进行了特化改造。"
 col_yuzu_city_rare_crystals_custom:1 "如果可能的话，§Y精炼理想城§!会将一个异星天然气生产岗位和一个易爆微粒生产岗位转变为两个稀有水晶生产岗位。\n\n"
 col_yuzu_city_volatile_motes:0"微粒化合型都市星球"
 col_yuzu_city_volatile_motes_desc:0"规模庞大的行星城市群，为时刻不停地化合易爆微粒进行了特化改造。"
 col_yuzu_city_volatile_motes_custom:1 "如果可能的话，§Y精炼理想城§!会将一个异星天然气生产岗位和一个稀有水晶生产岗位转变为两个易爆微粒生产岗位。\n\n"
 col_yuzu_city_rural:0"梦境星球"
 col_yuzu_city_rural_desc:0"这座都市星球的产业集中于幻梦境，综合生产着大量基础资源。"
 col_yuzu_city_generator:0"发电型梦境星球"
 col_yuzu_city_generator_desc:0"这座都市星球的产业集中于幻梦境，幻梦境中有着大量发电建筑。"
 col_yuzu_city_generator_custom:1 "如果可能的话，§Y梦境区划§!会将一个矿物生产岗位和一个食物生产岗位转变为两个能量币生产岗位。\n\n"
 col_yuzu_city_mining:0"矿产型梦境星球"
 col_yuzu_city_mining_desc:0"这座都市星球的产业集中于幻梦境，幻梦境中田园风光如画。"
 col_yuzu_city_mining_custom:1 "如果可能的话，§Y梦境区划§!会将一个能量币生产岗位和一个食物生产岗位转变为两个矿物生产岗位。\n\n"
 col_yuzu_city_farming:0"农业型梦境星球"
 col_yuzu_city_farming_desc:0"这座都市星球的产业集中于幻梦境，幻梦境中遍布着大量矿场。"
 col_yuzu_city_farming_custom:1 "如果可能的话，§Y梦境区划§!会将一个能量币生产岗位和一个矿物生产岗位转变为两个食物生产岗位。\n\n"
 col_yuzu_city_research:0 "研究型都市星球"
 col_yuzu_city_research_desc:0 "规模庞大的行星城市群，为研发尖端科技进行了特化改造。"
 col_yuzu_city_fortress:0 "堡垒型都市星球"
 col_yuzu_city_fortress_desc:1 "该都市星球到处充斥着轨道大炮、碉堡、要塞等等防御工事，要想入侵此行星或者发动起义是非常困难的。"
 col_yuzu_city_bureau:2 "统一型都市星球"
 col_yuzu_city_bureau_desc:4 "整个都市星球被用于处理各种行政事务，促进帝国的统一。"
 col_yuzu_city_bureau_spiritualist:0"教会型都市星球"
 col_yuzu_city_bureau_spiritualist_desc:0"整个都市星球被用于传播并稳固信仰，促进帝国的统一。"


 d_yuzu_aqua_eden:0"海上都市"
 d_yuzu_aqua_eden_desc:0"浮在海上的巨大都市。观光业的成功带给政府巨大的经济利益，现今已成为国家预算的固定收入之一。海上都市原本是为了看管吸血鬼而建设——因为岛被海水所围住，对于害怕海水的吸血鬼来说，这里是个不可能离开的地方，所以也可以看成是个囚禁吸血鬼的都市。随着时间的推移，人类早已与吸血鬼和平共处，不过这座海上都市仍然是全球吸血鬼的最大聚居地——星球上留有的记录如此记载。"
 d_yuzu_islenauts:0"浮空岛"
 d_yuzu_islenauts_desc:0"某一天突然出现在天空中的浮空岛屿。在这个伫立于广阔青空中的充满神秘色彩的岛屿上，排列着如同欧洲中世纪一般的街道，使用着魔法般的技术而非机械，在幻想世界中才会出现的人种在这里与人类一同居住。这个彻底违反物理定律的庞然大物至今仍困扰着我们的科学家，同时吸引着大量的游客前去观光旅行。"
 d_yuzu_damaged_buildings:0"£blocker£ 损毁建筑"
 d_yuzu_damaged_buildings_desc:0"这颗星球上到处都是因各种事故而损毁的建筑，大概是星球上的所有人类突然消失造成的。"
 d_yuzu_abyss_gate:0"深渊之门"
 d_yuzu_abyss_gate_desc:0"深渊教廷创造的深渊之门，会释放出深渊的气息。它的制造方法我们至今也没有完全弄明白，再加上它在某种程度上是我们所在位面与深渊的连接处，因此具有极高的科研价值。"
 d_yuzu_imitation_abyss_gate:0"深渊之门（仿制）"
 d_yuzu_imitation_abyss_gate_desc:0"我们根据原版深渊之门制造而出的仿制品，勉强实现了与深渊的连通。然而其连通方式我们自己也弄不明白，再加上它在某种程度上是我们所在位面与深渊的连接处，因此它还具有一定的科研价值。"
 d_yuzu_dream_gate:0"梦境之门"
 d_yuzu_dream_gate_desc:0"梦境之门是现实世界与幻梦境的直接交汇点，具有一定的科研价值。"
 d_yuzu_dream_land:0"梦境之地"
 d_yuzu_dream_land_desc:0"幻梦境中的星球与现实星球相对应。不过在幻梦境中，这里并不是钢铁丛林，而是充满着幻想色彩的瑰丽世界。"
 mod_district_yuzu_city_dream_max:0"梦境区划最大建造数量"
 d_yuzu_slime_reserve:0"史莱姆自然保护区"
 d_yuzu_slime_reserve_desc:0"为了不让史莱姆扰乱星球秩序而为它们建立的自然保护区，集中了整个星球残存的史莱姆。一些对史莱姆感兴趣的学者在此对史莱姆进行研究，偶尔还有一些想要找刺激的人来这里游玩。"


 yuzu_home_planet_modifier:0"柚子世界"
 yuzu_home_planet_modifier_desc:0"这里是柚子社女孩们的美好家园。"
 yuzu_with_slime:0"与史莱姆共处"
 yuzu_with_slime_desc:0"人们已经彻底习惯了与史莱姆相处，现在史莱姆的地位就如同路边的小猫小狗，甚至有人把它们当做宠物。不过虽然知道应对方法，但偶尔总会有那么一些人惨遭史莱姆的毒手。另外，史莱姆养殖业也在此兴起，史莱姆的分泌物制成的各种美味食品广受欢迎。"
 yuzu_abyss_infiltration:0"深渊侵蚀"
 yuzu_abyss_infiltration_desc:0"无穷无尽的深渊气息从深渊之门中涌出，笼罩了整颗星球，侵蚀着所接触到的一切，严重影响了人们的生活。"

 col_yuzu_city_capital_tt:0 "星系的心脏，权力的中枢。"
 col_yuzu_city_capital_hive_tt:0 "集体意识的脉搏在此星球上共振。"
 col_yuzu_city_capital_machine_tt:0 "中央处理核心在此发出指令的低鸣。"
 col_yuzu_city_mix_tt:0 "都市尚未定型，无尽潜能静候绽放。"
 col_yuzu_city_industrial_tt:0 "合金与消费品的生产线日夜不息。"
 col_yuzu_city_foundry_tt:0 "无数的合金铸造厂令此星球炽热如火。"
 col_yuzu_city_factory_tt:0 "装配线和工匠作坊的节律精确无差。"
 col_yuzu_city_refinery_tt:0 "稀有资源的精炼构成了此行星的脉搏。"
 col_yuzu_city_exotic_gases_tt:0 "异星天然气在此凝结成珍贵的财富。"
 col_yuzu_city_rare_crystals_tt:0 "稀有水晶的合成之光芒照亮了整颗行星。"
 col_yuzu_city_volatile_motes_tt:0 "易爆微粒的化合反应震颤着大地。"
 col_yuzu_city_rural_tt:0 "幻梦境中，田园风光与基础产业和谐共生。"
 col_yuzu_city_generator_tt:0 "幻梦境中的发电建筑如繁星般闪耀。"
 col_yuzu_city_mining_tt:0 "幻梦境的地下深处，矿场昼夜不息地运转。"
 col_yuzu_city_farming_tt:0 "幻梦境的沃土之上，农作物在繁星下生长。"
 col_yuzu_city_research_tt:0 "尖端科技在此星球上被不断推向极限。"
 col_yuzu_city_fortress_tt:0 "铜墙铁壁，坚不可摧的星际堡垒。"
 col_yuzu_city_bureau_tt:0 "行政事务在此被统一处理，维系帝国运转。"
 col_yuzu_city_bureau_spiritualist_tt:0 "信仰之光在此星球上汇聚，照亮前路。"

# Yuzu City Urban Districts (4.4.6 zone system — arcology specializations)
 district_yuzu_city_urban_1:0 "未分配塔楼"
 district_yuzu_city_urban_1_plural:0 "未分配塔楼"
 district_yuzu_city_urban_1_desc:0 "这些巨型塔楼可以根据需求灵活配置，用于工业制造、科研探索或商业贸易等多种特化用途。"
