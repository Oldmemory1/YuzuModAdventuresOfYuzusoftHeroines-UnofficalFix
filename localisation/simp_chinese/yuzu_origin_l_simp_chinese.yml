l_simp_chinese:

 origin_yuzu_world:0 "柚子世界"
 origin_yuzu_world_desc:0 "这一文明由因未知原因穿越来到神秘的柚子融合世界的柚子社女孩们及其克隆体组成，为了探求真相与生存发展，她们踏上了群星的旅途。"
 origin_tooltip_yuzu_effects:0 "—母星为柚子融合世界观的§H地球§!，拥有多个§H特殊地块§!\n—游戏开始时拥有多个与基因相关的科技"
 START_SCREEN_YUZU_WORLD:0"我们不知道自己是如何来到这个世界的，只知道我们一觉醒来，就置身于此了。\n\n在这个神秘的世界中，原本居住在其中的居民似乎都不见了，仿佛集体凭空消失了一般——只有我们几十名女孩们不知所措地集中在一起。\n\n在最初的慌乱之后，我们在城市中找到了一些有关这个世界的信息。经过分析，我们认为自己穿越到了临近2200年的一个平行世界，在这个平行世界中，我们各自世界所独有的元素融洽地结合在一起，共存并发展了数百年，并且基因科技尤为发达。不过，一层层谜团仍然笼罩在这个世界上空。\n\n为了解开谜团，我们需要借用整个世界的力量，而仅凭我们数十人显然无法恢复世界的运转。在仔细地探讨后，我们决定逐步启用世界各地的克隆仓，对自己进行克隆。于是，一个奇妙的国家就此诞生。\n\n穿越后数年，我们完成了原本只差临门一脚的超空间引擎的开发。为了探寻世界的真相，也为了在这个未知的宇宙更好地生存下去，我们将目光投向了浩瀚的星海。"

 START_SCREEN_YUZU_GENERAL:0"我们不知道自己是如何来到这个世界的，只知道我们一觉醒来，就置身于此了。\n\n在这个神秘的世界中，原本居住在其中的居民似乎都不见了，仿佛集体凭空消失了一般——只有我们几十名女孩们不知所措地集中在一起，旁边还有一个庞大的、怪异的、突兀的、仿佛跟我们一样不属于这个世界的建筑。\n\n在最初的慌乱之后，我们在城市中找到了一些有关这个世界的信息。经过分析，我们认为自己穿越到了临近2200年的一个平行世界。不过，一层层谜团仍然笼罩在这个世界上空。\n\n为了解开谜团，我们需要借用整个世界的力量，而仅凭我们数十人显然无法恢复世界的运转。在仔细地探讨后，我们决定启用那个神秘的建筑——经过调查后我们发现那是个克隆仓，对自己进行克隆。于是，一个奇妙的国家就此诞生。\n\n穿越后数年，我们完成了原本只差临门一脚的超空间引擎的开发。为了探寻世界的真相，也为了在这个未知的宇宙更好地生存下去，我们将目光投向了浩瀚的星海。"

 START_SCREEN_HEGEMON_YUZU:0 "我们不知道自己是如何来到这个世界的，只知道我们一觉醒来，就置身于此了。\n\n在这个神秘的世界中，原本居住在其中的居民似乎都不见了，仿佛集体凭空消失了一般——只有我们几十名女孩们不知所措地集中在一起，旁边还有一个庞大的、怪异的、突兀的、仿佛跟我们一样不属于这个世界的建筑。\n\n在最初的慌乱之后，我们在城市中找到了一些有关这个世界的信息。经过分析，我们认为自己穿越到了临近2200年的一个平行世界。不过，一层层谜团仍然笼罩在这个世界上空。\n\n为了解开谜团，我们需要借用整个世界的力量，而仅凭我们数十人显然无法恢复世界的运转。在仔细地探讨后，我们决定启用那个神秘的建筑——经过调查后我们发现那是个克隆仓，对自己进行克隆。于是，一个奇妙的国家就此诞生。\n\n之后，在我们的第一批亚光速探测器造访了临近我们的各恒星系后，我们发现那里存在两个迥异的外星文明。和我们类似，这两个外星文明也正将有能力开始实用性星际旅行，但他们的政府软弱无力、缺乏组织。\n\n在认识到他们的力量可以用来增进我们自身的力量后，我们开始推动一个在我们监管之下的星际联盟逐步建立，这一联盟把我们三个文明团结在一起。他们起初有所抵抗，但最终我们的领导与雄心所能带来的利益明显到了就连他们也无法忽视的程度。新秩序就此建立。\n\n穿越后数年，我们与他们共同完成了的超空间引擎的开发。为了探寻世界的真相，也为了在这个未知的宇宙更好地生存下去，我们将目光投向了浩瀚的星海。"

 START_SCREEN_DOOMSDAY_YUZU:0 "我们不知道自己是如何来到这个世界的，只知道我们一觉醒来，就置身于此了。\n\n在这个神秘的世界中，原本居住在其中的居民似乎都不见了，仿佛集体凭空消失了一般——只有我们几十名女孩们不知所措地集中在一起，旁边还有一个庞大的、怪异的、突兀的、仿佛跟我们一样不属于这个世界的建筑。\n\n在最初的慌乱之后，我们在城市中找到了一些有关这个世界的信息。经过分析，我们认为自己穿越到了临近2200年的一个平行世界，另外还有一个不幸的消息——我们脚下的星球已然行将就木。\n\n这颗星球上的地震和火山喷发已经肆虐了数千年，原住民科学家们的计算表明这颗地质构造不稳定的行星将会在未来不到一百年内四分五裂。\n\n由于没有方法可以暂停这一过程，原住民意识到他们作为一个物种整体的生存将取决于他们能否抛下[GetHomeWorldName]并在群星中的某处寻觅到避难之所。幸运的是，在我们穿越时，原住民对超空间引擎的开发已然达到了最后阶段。为了探求穿越的原因，更为了生存下去，我们需要借用整个世界的力量，而仅凭我们数十人显然无法恢复世界的运转。在仔细地探讨后，我们决定启用那个神秘的建筑——经过调查后我们发现那是个克隆仓，对自己进行克隆。于是，一个奇妙的国家就此诞生。\n\n穿越后数年，我们终于完成了超空间引擎的开发。第一艘有超空间航行能力的舰船已经准备就绪，但时间也已经不多了。\n\n我们必须找到新的家园。"

 START_SCREEN_LOST_COLONY_YUZU:0 "原初的原住民殖民者抵达[Root.Capital.GetName]的具体途径在史籍中语焉不详，但我们知道他们是乘着原始星舰跨越茫茫星海才来到这里的。许多人命丧中途，新家园地表的条件一开始也相当严酷。\n\n在克服了饥荒、野生动物侵袭以及无数艰险后，这颗行星最终被驯服。飞涨的人口数和大规模的建设很快使他们得以设法重返群星。\n\n原住民的故乡还在星海中的某处，我们想要对其人民告知这颗星球上他们同胞的经历。他们总不至于也因为穿越消失了吧？"

 START_SCREEN_STAR_SLINGSHOT_YUZU:0 "自上古以来这个星球上的原住民就能时不时地看到夜空被无数流星所照亮，但他们的科学家一直不能解释这种现象。随着原住民开始探索星系，他们最终获得了追踪这些扰动现象原因的必要装备——一个被他们的工程师称为$quantum_catapult_1$的古老构造。\n\n尽管陷入休眠，部分被毁还遭到遗弃，他们依旧坚信其能回复往日的荣光。如果按照他们的预期工作，它将成为通往星系各处的星门。\n\n可惜因为这场穿越的发生，他们的愿望大概是不能实现了，不过我们会替他们完成这个愿望的。"

 START_SCREEN_SHROUDWALKER_APPRENTICE_YUZU:1 "原住民的祖先流传下来关于导师的神话：他们无所不知，并且塑造了他们文明的早期阶段。通过托梦，他们从遥远的地方与原住民交流，将他们关于虚境的知识和智慧传授于原住民。\n\n如今在我们穿越后，导师再次降临，通过在我们的梦境中播撒下光怪陆离的画面，他教会了我们星际航行的秘诀。在短短的几年后，我们便能够建造舰船遨游太空。\n\n不过我们前方的路还有多长？我们的导师指明了“虚境隧道”这条路，那是一个坐落于他们母星系边陲的天然虫洞。创建我们自己的隧道便可以让我们通过这条路拜访导师。在我们踏入星际舞台之际，愿我们的导师继续赐予我们更多的智慧。"
 START_SCREEN_SHROUDWALKER_APPRENTICE_CORPORATE_YUZU:0 "原住民的祖先流传下来关于导师的神话：他们无所不知，并且塑造了他们文明的早期阶段。通过托梦，他们从遥远的地方与原住民交流，将他们关于虚境的知识和智慧传授于原住民。\n\n如今在我们穿越后，导师再次降临，通过在我们的梦境中播撒下光怪陆离的画面，他教会了我们星际航行的秘诀。在短短的几年后，我们便能够建造舰船遨游太空。\n\n但这并不是我们雄心壮志的尽头。我们的导师指明了“虚境隧道”这条路，那是一个坐落于他们母星系边陲的天然虫洞。如果我们创建好了这条神圣的通路，我们便能直接与导师会面。在我们踏入星际舞台之际，愿我们的导师继续赐予我们更多的智慧。"

 START_SCREEN_IMPERIAL_VASSAL_YUZU:0 "$START_SCREEN_YUZU_GENERAL$\n\n然而，当我们第一次离开母星系时，就遇到了一个迫使我们臣服的外星帝国。尽管对于人民而言这是一段痛苦的记忆，但事实证明这段附庸关系远比我们想象中有益得多，在这段短暂的附庸时光中，我们学到了不少东西。\n\n我们并非宗主国唯一的附庸，因为我们已经接见了其他在宗主国控制下国家所派出的外交官和大使。虽然我们与其中的某些家伙看不对眼，但至少现在他们还是有用的盟友。\n\n不过，我们虽然盼望着有朝一日能独立自主地决定自身的命运，但现在还是要接受当下的附属国地位，并充分利用目前的局面。"

 START_SCREEN_HERE_BE_DRAGONS_YUZU:0"我们知道这条龙。自远古时代以来，它就为[GetHomeWorldName]上空增光添彩，原住民与它的早期互动散布在[GetHomeWorldName]各地的民间传说中。很长一段时间，这是一个关于冲突的故事，因为原住民早期的武器证明无法与强大的野兽匹敌——但后来的故事讲述了一位有远见的人，他力排众议，设法促成了原住民和龙之间的和平。\n\n在随后的遭遇中，龙被证明是一个遗世而神秘的形象，它的榜样曾经激励他们努力去追寻星辰大海。然而，快速推进系统的发明与超航道网络的发现带来了与龙的新的、不安的关系时期，因为他们越来越多地侵入它已经孤独地漫游了亿万年的区域。\n\n穿越到这个世界以后，必须由我们自己来决定我们的未来：$START_SCREEN_HERE_BE_DRAGONS_END$"