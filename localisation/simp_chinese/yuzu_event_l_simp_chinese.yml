l_simp_chinese:

 Yuzu_country_event.1.name:0"除祟"
 Yuzu_country_event.1.desc:0"众人的祈愿汇聚到丛雨丸中，刀身闪过一道耀眼的光芒，直达宇宙的边荒。"
 Yuzu_country_event.1.a:0"震撼人心。"

 Yuzu_country_event.2.name:0"时空通道被打开"
 Yuzu_country_event.2.desc:0"我们用银钥匙在首都星系打开了一个时空通道，从中获得了一只舰队。"

 Yuzu_country_event.4.name:0"凝视深渊"
 Yuzu_country_event.4.desc:0"随着我们不断地发展，星海的危机四伏不断地展露在我们眼前。我们有必要认为，只有掌握真正的力量，才能掌握自己的命运。"
 Yuzu_country_event.5.name:0"凝视深渊"
 Yuzu_country_event.5.desc:0"完成了。通过对深渊教廷遗址的发掘，我们获得了大量禁忌的知识。深渊的大门被我们打开了一条缝隙，希望我们能够正确地使用这份力量。"

 Yuzu_country_event.6.name:0"荒废的非法研究实验室"
 Yuzu_country_event.6.desc:0"在一次偶然事件中，一队迷路的游客发现了一座地下实验室。当地政府得到消息后很快封锁了现场，在派出人员调查后，我们发现，这是一所研究人造狼人的非法实验室——当然，早已荒废。\n\n狼人是一种更加强大的吸血鬼，能够通过吸食吸血鬼的血液来获得对象的能力，若控制不好将十分危险。\n\n现在我们已经获得了他们的所有研究资料。"
 Yuzu_country_event.6.a:0"分析研究资料。"
 Yuzu_country_event.6.b:0"这太危险了，销毁它们。"
 Yuzu_country_event.7.name:0"实验资料分析完成"
 Yuzu_country_event.7.desc:0"研究资料分析完成。虽然人造狼人十分危险，但若是少量制造并进行严格管控，一定会成为非常强大的陆军力量。另外，如果把相关的技术与我们现在的生物科技结合起来，运用到基因工程中，想必可以在基因修饰领域获得重大的突破。"

 Yuzu_country_event.9.name:0"神话生物被击败"
 Yuzu_country_event.9.desc:0"长久以来盘踞在都市星球废墟上空的神话生物被击败了，虽然它似乎没有被杀死，但是已然无法维持时空裂缝的存在了。现在时空裂缝正在愈合，它已经回到了自己的时空，我们判断它以后应该不会再出现了。\n现在，我们可以无所顾忌地调查这个星系了。不过，我们的一些科学家提议，趁着时空裂缝还没消失，应该抓紧时间进行研究。"
 Yuzu_country_event.9.a:0"对时空裂缝进行研究。"
 Yuzu_country_event.10.name:0"时空裂缝研究完成"
 Yuzu_country_event.10.desc:0"通过对这个巨大的时空裂缝的近距离详细分析，我们在物理学研究，特别是力场操控研究领域上有了巨大的进展。"
 Yuzu_country_event.10.a:0"很好。"
 
 Yuzu_country_event.11.name:0"深渊之门"
 Yuzu_country_event.11.desc:0"在重建[From.GetName]的过程中，我们发现了一个神秘的大型装置，似乎叫做深渊之门。按照这个星球上的典籍记载，这似乎是用来沟通深渊的装置。该装置的构造过于复杂，普通方式无法修复，我们的科学家提议派出专业的科研团队进行修复。"
 Yuzu_country_event.11.a:0"就这么办。"
 Yuzu_country_event.11.b:0"不，这太危险了。"
 Yuzu_country_event.12.name:0"深渊侵蚀"
 Yuzu_country_event.12.desc:0"在[FromFromFrom.GetName]上的深渊之门被我们修复完毕时，毫无预兆地，大量暗紫色的类似浓雾的东西从门中疯狂涌出。这些紫色的浓雾状物暂时被我们命名为深渊之息，它在一天之内就笼罩了整颗星球，侵蚀着它所接触到的一切。\n\n我们的科学家及时撤离了深渊之息的爆发点，但是想再回去已经不可能了，深渊之息从深渊之门中一刻不断地涌出，周围的浓度高到我们最先进的防护装置也挡不住超过10秒。虽然弥漫开来后它的浓度有所下降，不至于对星球上的人们造成致命威胁，但是若不解决，人们将每天都得穿着厚重的防护服，工作和生活也将收到严重的影响。"
 Yuzu_country_event.12.a:0"一定要想尽一切办法解决！"
 Yuzu_country_event.13.name:0"解决方案"
 Yuzu_country_event.13.desc:0"虽然寻常的方法行不通，但我们最终还是在深渊教廷遗落的一本典籍上找到了线索。深渊教廷释放出深渊之息后，利用特殊的方法将这股气息处理后引入星球的每一个角落，借以提升自身的工作效率。深渊教廷的深渊圣者们可以适应处理后的气息的影响，虽然我们不行，但是如果借助一些辅助设备的话，就应该可以将影响降到最低。也就是说，我们可以通过城市的改造来将深渊之息的负面影响基本消除，还能借助它提升我们的生产效率。"
 Yuzu_country_event.13.a:0"很好，立刻开始建设。"

 Yuzu_country_event.100.name:0"愿望:资源充足"
 Yuzu_country_event.100.desc:0"我们许下愿望，希望获得更多的资源。"
 Yuzu_country_event.100.a:0"我们想要更多的能量币。"
 Yuzu_country_event.100.b:0"我们想要更多的矿物。"
 Yuzu_country_event.100.c:0"我们想要更多的食物。"
 Yuzu_country_event.100.d:0"我们想要更多的消费品。"
 Yuzu_country_event.100.e:0"我们想要更多的合金。"
 Yuzu_country_event.100.f:0"我们想要更多的易爆微粒。"
 Yuzu_country_event.100.g:0"我们想要更多的异星天然气。"
 Yuzu_country_event.100.h:0"我们想要更多的稀有水晶。"
 Yuzu_country_event.100.i:0"我们想要更多的活体金属。"
 Yuzu_country_event.100.j:0"我们想要更多的泽珞。"
 Yuzu_country_event.100.k:0"我们想要更多的暗物质。"
 Yuzu_country_event.100.l:0"我们想要更多的纳米机器人。"
 Yuzu_country_event.101.name:0"愿望:科技进步"
 Yuzu_country_event.101.desc:0"我们许下愿望，希望能够获得科技上的进步。"
 Yuzu_country_event.101.a:0"我们想要获得物理学研究领域的进步。"
 Yuzu_country_event.101.b:0"我们想要获得社会学研究领域的进步。"
 Yuzu_country_event.101.c:0"我们想要获得工程学研究领域的进步。"
 Yuzu_country_event.101.d:0"我们想要获得所有研究领域的进步。"
 Yuzu_country_event.102.name:0"愿望:扩大影响"
 Yuzu_country_event.102.desc:0"我们许下愿望，希望能够扩大我们的影响。"
 Yuzu_country_event.102.a:0"我们想要更多的凝聚力。"
 Yuzu_country_event.102.b:0"我们想要更多的影响力。"
 Yuzu_country_event.102.c:0"我们想要为领袖获得更多经验。"
 Yuzu_country_event.103.name:0"愿望:文化强国"
 Yuzu_country_event.103.desc:0"我们许下愿望，希望获得更多的稀有文物。"
 Yuzu_country_event.104.name:0"愿望:舰队增援"
 Yuzu_country_event.104.desc:0"我们许下愿望，希望获得舰队上的增援。"
 Yuzu_country_event.105.name:0"愿望:世界和平"
 Yuzu_country_event.105.desc:0"我们许下愿望，希望世界和平。"
 Yuzu_country_event.107.name:0"愿望:失落建筑"
 Yuzu_country_event.107.desc:0"我们许下愿望，希望能够建造一座指定的进阶版失落帝国建筑。"
 Yuzu_country_event.107.a:0"我们想要获得一座覆天穹顶。"
 Yuzu_country_event.107.b:0"我们想要获得一座五级奇点。"
 Yuzu_country_event.107.c:0"我们想要获得一座多重次元制造机。"
 Yuzu_country_event.107.d:0"我们想要获得一座营养圣殿。"
 Yuzu_country_event.107.e:0"我们想要获得一座财富圣殿。"
 Yuzu_country_event.107.f:0"我们想要获得一座混沌熔炉。"
 Yuzu_country_event.107.g:0"我们想要获得一座神秘档案库。"
 Yuzu_country_event.107.h:0"我们想要获得一座苍穹神龛。"
 Yuzu_country_event.107.i:0"我们想要获得一座圣盾基地。"
 Yuzu_country_event.107.j:0"我们想要获得一座神秘冷冻室。"
 Yuzu_country_event.107.k:0"我们想要获得一座外星庇护所。"
 Yuzu_country_event.108.name:0"愿望:巨构建造"
 Yuzu_country_event.108.desc:0"我们许下愿望，希望立即完成当前巨型结构的建造。"


 Yuzu_planet_event.1.desc:0"没错！这里，就是这里！吾辈感受到了丛雨丸的气息！"
 Yuzu_planet_event.1.a:0"丛雨丸的气息？"
 Yuzu_planet_event.1.a.response:0"吾辈来到这个世界的时候还以为与丛雨丸分开了，但吾辈始终能感受到与丛雨丸的联系。今天吾辈来到这里散步，明显感受到了丛雨丸的气息。绝对错不了，丛雨丸就在这里！"
 Yuzu_planet_event.1.b:0"你找不到丛雨丸吗？"
 Yuzu_planet_event.1.b.response:0"虽然吾辈能感受到丛雨丸的气息，但是这里的气息非常混乱，吾辈无法准确找到丛雨丸的位置，吾辈需要大家的帮助。"
 Yuzu_planet_event.1.c:0"你现在在哪里？"
 Yuzu_planet_event.1.c.response:0"说来奇怪，这里在地图上根本没有标出来，吾辈直接把定位发过去吧。"
 Yuzu_planet_event.1.d:0"好的。(关闭通讯)"
 Yuzu_planet_event.1.d.response:0"§Y<在母星生成一个考古站点。>§!"


 Yuzu_arc_sites_event.1.name:0"拼花地板"
 Yuzu_arc_sites_event.2.name:0"丛雨丸"
 Yuzu_arc_sites_event.3.name:0"变化的数据"
 Yuzu_arc_sites_event.4.name:0"变化的时空"
 Yuzu_arc_sites_event.5.name:0"时空乱流"
 Yuzu_arc_sites_event.6.name:0"禁忌的力量"
 Yuzu_arc_sites_event.1.desc:0"考古学家们在进行初步探测后，惊人地发现她们的探测设备都出现了些许的偏差，无法准确定位到丛雨丸的位置。在进行人力探查后，我们的考古团队很快发现，这里的建筑物分布得毫无规律可言，甚至有两座建筑拼接在一起，状似穿模。另外，这里的土质也十分杂乱，各种不同的土壤拼接在一起，如同一块巨大的拼花地板。考古学家们目前对此毫无头绪，只能确定这不是人为造成的。"
 Yuzu_arc_sites_event.2.desc:0"找到了！丛雨丸就插在这里的某处地面上，周围被灌木丛覆盖导致它很难被发现。与此同时，考古团队发现，她们的很多探测设备出现了异常，读数忽上忽下，仿佛在急速变化。"
 Yuzu_arc_sites_event.3.desc:0"经过漫长时间的分析，我们的考古学家发现，设备没有出错，在原先丛雨丸所在地周围，空间坐标、风向、热辐射等各种数据都在飞快变化！这个匪夷所思的事实给我们的科学界带来了巨大的震撼，目前我们的考古团队以及许多其他科学家们正在继续努力查明这背后的原因。"
 Yuzu_arc_sites_event.4.desc:0"终于，经过漫长的时间，考古学家们终于找到了真正的原因。真正在飞快变化的不是那些探测数据，而是时空本身！时间与空间的各种难以理解的变化造成了其他各种探测数据的变化。不过究竟为什么时空会发生变化，我们的科学家们依然一头雾水。"
 Yuzu_arc_sites_event.5.desc:0"经过各种模型与假说的建立与推翻，科学家们终于做出了一个最有可能是事实的推测——以丛雨丸原先所在地为原点，这里爆发了一股席卷全球的时空乱流——这个星球上原先的人类正是被这股时空乱流带到了未知的时空。而我们——最初的几十人，也应当是被类似的时空乱流在同一时间带到了这个星球上。不过时空乱流不可能无缘无故爆发，科学家们正试图查明原因。"
 Yuzu_arc_sites_event.6.desc.first_finder:0"以丛雨丸为出发点，有人推测这股时空乱流带有邪恶的力量,丛雨丸被这股邪恶的力量所吸引，前往爆发原点镇压。之后，丛雨果然在这里察觉到了一丝禁忌的气息。在科学界热烈地讨论后，一切都明朗了起来——在某处，一股庞大的禁忌力量引发了波及多个平行宇宙的时空乱流。而幸运的是，我们的科学家们依据残留的时空变化轨迹，克服了种种艰难险阻，成功定位到了力量的原发点——它恰巧就在这个宇宙、这个星系、我们的母星系旁边。"
 Yuzu_arc_sites_event.6.desc.not_first_finder:0"以丛雨丸为出发点，有人推测这股时空乱流带有邪恶的力量,丛雨丸被这股邪恶的力量所吸引，前往爆发原点镇压。之后，丛雨果然在这里察觉到了一丝禁忌的气息。在科学界热烈地讨论后，一切都明朗了起来——在某处，一股庞大的禁忌力量引发了波及多个平行宇宙的时空乱流。而幸运的是，我们的科学家们依据残留的时空变化轨迹，克服了种种艰难险阻，成功定位到了力量的原发点——它恰巧就在这个宇宙、这个星系。"
 Yuzu_arc_sites_event.2.a:0"查明原因。"

 Yuzu_arc_sites_event.7.name:"神奇的符号"
 Yuzu_arc_sites_event.8.name:"深渊教廷"
 Yuzu_arc_sites_event.9.name:"准备深入"
 Yuzu_arc_sites_event.10.name:"可怕的典籍"
 Yuzu_arc_sites_event.11.name:"万物归一者"
 Yuzu_arc_sites_event.12.name:"失败的仪式"
 Yuzu_arc_sites_event.7.desc:"我们在这里发现了零星可以辨认的文字，它们像是某种宗教符号。令人惊奇的是，虽然考古学家们完全不认识这些符号，但是她们在看到的一瞬间就明白了它们所表达的意思，不过随之而来的是头晕目眩等精神问题。似乎这些符号能够影响人的精神，为了保证我们的考古学家的精神健康，所以我们放缓了调查文字的速度。"
 Yuzu_arc_sites_event.8.desc:"随着文字调查的缓慢推进，我们大致知晓了这个曾经存在于这里的文明的基本信息。这个帝国名为深渊教廷，是一个宗教国家，信仰着众多神明。深渊教廷早已在灾难发生前不知多少万年就统治了整个星系，近千年前又统一了所在的星系团。我们脚下这颗星球名为永恒，而在同一轨道上的另外两颗庞大星球分别名为混沌和黑暗，它们都是深渊教廷人工制造的都市星球，而围绕在这些都市星球周围的卫星全部都是从各个星系中搜集来的盖亚星球。"
 Yuzu_arc_sites_event.9.desc:"随着对星球表面的扫描工作完成，我们确定了这里没有任何的生物遗骸。科学家们推测，也许这里的生物跟我们的母星上的一样，全部被时空乱流带去了未知的时空。粗略的广泛调查似乎得不到更多有用的信息了，我们的考古学家们决定进入这个星球最高的一座塔状建筑物进行深入调查，这里也许是星球的行政中心或者大教堂。"
 Yuzu_arc_sites_event.10.desc:"果然，我们在这里发现了许多的宗教典籍，然而初步阅读之后，其中的内容让我们的考古学家不敢相信。这里不是什么行政中心或者大教堂，而是一个超大规模的献祭法阵。按典籍上的仪式所说，深渊教廷需要在这个法阵内汇聚星系团内一万智慧种族，每个种族一亿人，将这一万亿人同时献祭，以此为引，可以抽离整个星系团内所有生命的灵魂。"
 Yuzu_arc_sites_event.11.desc:"尽管十分不适，但我们的考古学家们依然坚持着阅读这里的众多典籍。终于，我们发现了他们献祭的目的。\n\n万物归一者，门之主——无穷宇宙所有时空皆包含在祂之中。深渊教廷似乎想要将庞大的灵魂之力献祭给祂，以此飞升“深渊”——某种位于维度与时空之外的位面。也是因为这个原因，深渊教廷的所有国民全部聚集在这个恒星系，等待着飞升。"
 Yuzu_arc_sites_event.12.desc:"根据典籍描述，成功飞升对环境的影响绝不会是现在这样。我们有理由认为，他们的仪式失败了，失败的仪式引发了超大规模的时空乱流，几乎摧毁了整个恒星系，并波及了数个平行宇宙——当然包括我们的，不管是以前的，还是现在的。不过，既然引发了这么大规模的时空乱流，根据推测，整个星系团内的生物灵魂应该确实都被抽取了。很显然，我们现在这个生机勃勃的星系，不可能是被抽取过灵魂的星系，所以这个深渊教廷的首都恒星系，应当是被时空乱流转移到这个星系的。\n\n考古结束后，我们带走了他们主持仪式的道具——一把银色的钥匙。"
 Yuzu_arc_sites_event.10.a:0"他们疯了！"
 Yuzu_arc_sites_event.11.a:0"……"
 Yuzu_arc_sites_event.12.a:0"我们和他们，都是异界来客。"


 Yuzu_situation_event.1.name:0"史莱姆危机"
 Yuzu_situation_event.1.desc:0"最近，平时都待在[Target.GetName]上的浮空岛特定区域的史莱姆们一反常态，开始迅速增殖并扩张它们的活动范围，而且经常性袭击附近的居民。更加糟糕的是，它们现在已经通过各种途径扩散到了全球。\n\n虽然史莱姆的攻击不会对身体造成伤害，但会迅速溶解身上的衣物，对民众造成了非常大的困扰。虽然我们能够用火驱逐它们，但这仍治标不治本。如果继续照这样增殖下去，它们怕是要充满整个星球了！"
 Yuzu_situation_event.1.a:0"问题不大，不用管它们。"
 Yuzu_situation_event.1.b:0"派出特殊部队对史莱姆进行清除。"
 Yuzu_situation_event.2.name:0"最后的处理"
 Yuzu_situation_event.2.desc:0"[Target.GetName]上的浮空岛之外的史莱姆基本都已经被清除，人们的生活已经基本不受其干扰。现在我们的特殊部队正准备对浮空岛上的史莱姆进行处理。"
 Yuzu_situation_event.2.a:0"把它们赶回原本的居住地进行封锁。"
 Yuzu_situation_event.2.b:0"把这群可恶的史莱姆赶尽杀绝！"
 Yuzu_situation_event.3.name:0"进展顺利"
 Yuzu_situation_event.3.desc:0"[Target.GetName]上的史莱姆清除行动进行得非常顺利，星球各地的史莱姆的数量都已经大大减少，人们被袭击的频率也相应地降低了。"
 Yuzu_situation_event.3.a:0"干的不错。"
 Yuzu_situation_event.4.name:0"影响加剧"
 Yuzu_situation_event.4.desc:0"由于[Target.GetName]上的史莱姆活动并未得到有效遏制，现在它们的数量已经翻了好几倍，民众被袭击的频率也相应增高，星球的秩序已经受到了严重影响。"
 Yuzu_situation_event.4.a:0"政府应当给予民众援助。"
 Yuzu_situation_event.4.b:0"问题……不大……吧……？"
 Yuzu_situation_event.4.c:0"够了！我们现在要去为死去的衣物报仇！"
 Yuzu_situation_event.5.name:0"逐渐适应"
 Yuzu_situation_event.5.desc:0"[Target.GetName]上的史莱姆数量似乎增长到了一个极限，增值速度明显放缓，而民众似乎也慢慢掌握了史莱姆的习性和应对它们的技巧，并开始习惯于与史莱姆相处。"
 Yuzu_situation_event.5.a:0"我就说吧，问题不大。"
 Yuzu_situation_event.6.name:0"史莱姆已灭绝"
 Yuzu_situation_event.6.desc:0"很快，[Target.GetName]上的史莱姆已经被彻底清除，现在这颗星球上已经完全找不到它们的踪迹了。人们再也不用担心受到史莱姆的袭击了。"
 Yuzu_situation_event.6.a:0"算是永绝后患了。"
 Yuzu_situation_event.7.name:0"史莱姆自然保护区"
 Yuzu_situation_event.7.desc:0"封锁已经建立，我们将史莱姆赶回了它们原本在浮空岛上的居住地，并在此建立了史莱姆自然保护区。\n\n史莱姆的动乱已经结束，一些在这个事件中对史莱姆产生了兴趣的学者纷纷到此对史莱姆进行研究，偶尔还有一些想要找刺激的人来这里游玩。"
 Yuzu_situation_event.7.a:0"万事大吉。"
 Yuzu_situation_event.8.name:0"完全适应"
 Yuzu_situation_event.8.desc:0"史莱姆已经完全融入了[Target.GetName]上人们的生活，人们已经彻底习惯了与它们相处，甚至有人把它们当做宠物。最终史莱姆的数量并没有我们想象中的多，再加上人们已经掌握了应对它们的技巧，民众受到袭击的频率已经大大减少了。\n\n值得一提的是，这段时间有位民间炼金术士找到了一种神奇的方法把史莱姆的分泌物变成了一种类似果冻的食材，这种食材用途广泛且美味非常。现在，各种史莱姆养殖场纷纷建立，已经开始有人抱怨周围的史莱姆越来越少了。"
 Yuzu_situation_event.8.a:0"真是意想不到的结果。"


 Yuzu_planet_destruction_event.101.name:0"孵化星球已回溯"
 Yuzu_planet_destruction_event.101.desc:0"先前[From.GetName]还是一个只能用扭曲的噩梦形容的地狱，但是现在它变得完好无损，就像什么都没有发生过一样。\n\n我们拯救了这颗星球。"
 Yuzu_planet_destruction_event.101.a:0"这就是时间的伟力。"
 Yuzu_planet_destruction_event.102.name:0"星球回溯"
 Yuzu_planet_destruction_event.102.desc:0"[From.GetName]上的时间力场消散后，我们观测到这颗星球上的所有高等有机生命都已经不复存在，星球的地貌也发生了巨大的变化。显然，这颗星球成功地回到了遥远的过去。"
 Yuzu_planet_destruction_event.103.name:0"毁灭的都市星球已复原"
 Yuzu_planet_destruction_event.103.desc:0"这颗看似完全无法修复的星球确实被修复了，规模庞大的理想城废墟展现在我们眼前。\n\n不知道这颗星球在时空乱流的影响下度过了多么漫长的岁月，以至于我们完全无法回溯至它破败前的时间。不过没有关系，我们将会亲手让它重现旧日的辉煌。"
 Yuzu_planet_destruction_event.103.a:0"我们见证了奇迹。"
 Yuzu_planet_destruction_event.104.name:0"土著重现"
 Yuzu_planet_destruction_event.104.desc:0"当时间力场消散后，我们惊讶地发现，[From.GetName]上出现了土著！在遥远的过去，他们可能被某种灾难毁灭了，又或者离开了这颗星球，但是在外部环境不同的现在，他们的命运很可能就此改变。"
 Yuzu_planet_destruction_event.104.a:0""
 Yuzu_planet_destruction_event.105.name:0"星球回溯"
 Yuzu_planet_destruction_event.105.desc:0"[From.GetName]上的时间力场消散后，我们观测到这颗星球表面上刚刚还存在着的事物都已经不复存在了，星球的地貌也发生了巨大的变化。显然，这颗星球成功地回到了遥远的过去。"
 Yuzu_planet_destruction_event.105.a:0"很好。"
 Yuzu_planet_destruction_event.110.name:0 "[From.GetName]上的新土著"
 Yuzu_planet_destruction_event.110.desc.self:0 "我们对[From.GetName]上的土著文明进行了时间回溯，然而回溯之后这里却又出现了新的土著。\n\n看来观测站上的职员们还得继续在这里工作。"
 Yuzu_planet_destruction_event.110.desc.notself:0 "[FromFrom.Owner.GetName]的部队已经将滋生在[From.GetName]的土著文明进行了时间回溯，然而这里却又出现了新的土著。\n\n观测站上的职员们表示他们心情十分复杂……"
 Yuzu_planet_destruction_event.110.a:0 "真是有趣。"
 Yuzu_planet_destruction_event.111.name:0 "对[From.GetName]的观测终止"
 Yuzu_planet_destruction_event.111.desc.self:0 "尽管对土著文明使用超级武器非常有趣，但这也意味着那里已经没什么剩下的可供观测了……"
 Yuzu_planet_destruction_event.111.desc.notself:0 "[FromFrom.Owner.GetName]的部队已经将滋生在[From.GetName]的土著文明进行了时间回溯。作为结果，这里已经没什么剩下的可供观测了……"
 Yuzu_planet_destruction_event.111.a:0 "那就这样吧。"


 Yuzu_window_event.1.name:0"破败的深渊"
 Yuzu_window_event.1.desc:0"对时空乱流原发星系的探测深深地震撼了我们的科学家。\n\n该星系看上去一片狼藉，到处都是庞大的残破星球，它们与个别完好的星球一同以自然条件下不可能形成的排布方式环绕着中央黑洞，而黑洞周围那无人的破损环形世界正静静地旋转。可以想象在灾难发生前这里是何等的辉煌。\n\n我们不知道是怎样强大的文明才能完成这神迹一般的工程，但他们显然已经不存在了，我们的探测器没有检测到任何的生命迹象——除了在那大小已然超越了绝大多数气态巨行星的都市星球废墟上空，正从狰狞的时空裂缝中探出身体发出咆哮的仿佛神话中的生物……"
 Yuzu_window_event.1.a:0"可怕的场景。"
 Yuzu_window_event.2.name:0"时空乱流原发星系"
 Yuzu_window_event.2.desc:0"对时空乱流原发星系进行探测后，其样貌深深地震撼了我们的科学家。究竟是怎样强大的文明才能完成这神迹一般的星系改造工程？\n\n不过似乎已经有国家在我们之前发现了这个星系。"
 Yuzu_window_event.2.a:0"我们一定要把它弄到手。"

 Yuzu_window_event.5.name:0"$tech_yuzu_star_eater$"
 Yuzu_window_event.5.desc:0 "§H$tech_yuzu_star_eater$§!——本星系有史以来最强大的星舰，被我们建造完成了。它不仅可以直接引爆恒星并产生大量暗物质，还强大到仅仅凭借一船之力就能毁灭一整支舰队。\n\n凭借这艘舰船，我们将掌握整个星系的话语权。"
 Yuzu_window_event.5.a:0 "我们将无人能挡。"
 Yuzu_window_event.5.b:0 "希望不会有国家让我们动用它。"
 
 Yuzu_window_event.104.name:0"深渊之城已建立"
 Yuzu_window_event.104.desc:0"被特殊仪式强化过的大型处理装置将深渊之门笼罩，其内部源源不断涌出的深渊之息经过处理后通过蛛网般遍布整个都市星球的通道被引入星球的每一个角落。\n\n笼罩在星球表面的紫色浓雾正在消散，与此同时，借助深渊之息的力量，我们的生产效率得到了显著的提高，相比之下，那些消除深渊之息负面影响的维护开支就显得微不足道了。"
 Yuzu_window_event.105.name:0"深渊之城已建立"
 Yuzu_window_event.105.desc:0"[Root.GetName]上的深渊之门被修复，门中源源不断涌出的深渊之息被经过特殊仪式强化过的大型处理装置所处理，之后后通过蛛网般遍布整个都市星球的通道被引入星球的每一个角落。\n\n借助深渊之息的力量，我们的生产效率得到了显著的提高，相比之下，那些消除深渊之息负面影响的维护开支就显得微不足道了。"
 Yuzu_window_event.106.name:0"深渊之城已建立"
 Yuzu_window_event.106.desc:0"我们成功地在[Root.GetName]上仿制出了一座深渊之门，虽然比起原版仍有差距，但也足够我们使用了。门中源源不断涌出的深渊之息被经过特殊仪式强化过的大型处理装置所处理，之后后通过蛛网般遍布整个都市星球的通道被引入星球的每一个角落。\n\n借助深渊之息的力量，我们的生产效率得到了显著的提高，相比之下，那些消除深渊之息负面影响的维护开支就显得微不足道了。"
 Yuzu_window_event.107.name:0"夕阳之城已建立"
 Yuzu_window_event.107.desc:0"我们在[Root.GetName]上建立起了一座梦境之门。梦境之门将幻梦境中的[Root.GetName]投影于现实中的[Root.GetName]，在现实与梦境的重叠中，我们可以轻松地往来两者之间，开发那梦境中的神秘土地。"
 Yuzu_window_event.107.a:0"这是独属于我们自己的理想城！"
 
 
 Yuzu_abyss_crisis_event.2.name:0"时空波动"
 Yuzu_abyss_crisis_event.2.desc:0"我们检测到了一股异常庞大的时空波动，目前这股波动仍在持续增强中。科学家们正在抓紧时间分析其来源。"
 Yuzu_abyss_crisis_event.5.desc:0"报告。这里是教廷第7搜查队，已发现圣都踪迹，准确度:100%。目标位于0589宇宙，详细坐标已发送。开始执行障碍排除工作。\n——这个星系的下等生物听令，立刻放弃抵抗，成为教廷的祭品是你们无上的荣光。"
 Yuzu_abyss_crisis_event.5.a:0"你说什么！？"
 Yuzu_abyss_crisis_event.5.b:0"你们是！？"
 Yuzu_abyss_crisis_event.6.name:0"时空震荡"
 Yuzu_abyss_crisis_event.6.desc:0"我们在§H[abyss_invasion_system.GetName]§!星系检测到了剧烈的时空震荡，就仿佛空间瞬间被撕裂，然后又被强行闭合。"
 Yuzu_abyss_crisis_event.6.a:0"发生了什么？"
 Yuzu_abyss_crisis_event.7.name:0"恒星系被毁"
 Yuzu_abyss_crisis_event.7.desc:0"我们在§H[abyss_invasion_system.GetName]§!星系检测到了剧烈的时空波动，随后整个§H[abyss_invasion_system.GetName]§!星系被彻底地摧毁了！恒星本体坍缩成了一个黑洞。\n在那之后，我们的探测器探测到数量不明的舰队出现在该星系内部。"
 Yuzu_abyss_crisis_event.7.a:0"天哪。"
 Yuzu_abyss_crisis_event.9.name:0"剧烈波动"
 Yuzu_abyss_crisis_event.9.desc:0"我们在§H[abyss_invasion_system.GetName]§!星系及其附近检测到了比深渊教廷搜查队来时更剧烈的时空波动，其规模之大，匪夷所思。分析报告指出，这次波动的来源也许根本不在这个宇宙。"
 Yuzu_abyss_crisis_event.9.a:0"这是……？"
 Yuzu_abyss_crisis_event.9.b:0"“教廷”要来了……"
 Yuzu_abyss_crisis_event.12.name:0"降临"
 Yuzu_abyss_crisis_event.12.desc:0"传感器显示，在§H[abyss_invasion_system.GetName]§!星系附近出现了极其剧烈的时空震荡。随后，我们观测到那里好像凭空出现了一个恒星系。"
 Yuzu_abyss_crisis_event.12.a:0"令人震惊。"
 Yuzu_abyss_crisis_event.13.desc:0"……确认，第7搜查队已全灭。\n——尔等的实力值得赞赏，但尔等终究要为这傲慢的挑衅行为付出代价。"
 Yuzu_abyss_crisis_event.13.a:0"准备迎战！"
 Yuzu_abyss_crisis_event.14.desc:0"圣都……吾等回来了。"
 Yuzu_abyss_crisis_event.14.a:0"……！"
 Yuzu_abyss_crisis_event.97.desc:0"……低估尔等了，没想到这片星系中居然还有这样的力量。但是太晚了，教廷已经来了。\n好好珍惜尔等所剩不多的时间，然后迎接教廷的降临吧。"
 Yuzu_abyss_crisis_event.97.a:0"……"
 Yuzu_abyss_crisis_event.97.b:0"我们会像碾碎你们一样碾碎你们的教廷！"
 Yuzu_abyss_crisis_event.98.desc:0"……低估尔等了，没想到这片星系中居然还有这样的力量。但是没用的，就算信号发送中断，教廷也已经锁定这里了，尔等不过是获得了些苟延残喘的时间而已。\n好好珍惜尔等所剩不多的时间，然后迎接教廷的降临吧。"
 Yuzu_abyss_crisis_event.98.a:0"……"
 Yuzu_abyss_crisis_event.98.b:0"我们会像碾碎你们一样碾碎你们的教廷！"

 Yuzu_abyss_crisis_event.99.desc_01:0"……"
 Yuzu_abyss_crisis_event.99.desc_02:0"下等生物，尔等想要说什么？"
 Yuzu_abyss_crisis_event.99.a:0"你们是谁？"
 Yuzu_abyss_crisis_event.99.a.response:0"吾等乃深渊教廷第7搜查队，负责寻找圣都的下落——当然，现在已经找到了。"
 Yuzu_abyss_crisis_event.99.b:0"你们到底想做什么？"
 Yuzu_abyss_crisis_event.99.b.response:0"取回圣都，重建教廷。吾等不过是在清理挡路的石子。"
 Yuzu_abyss_crisis_event.99.c:0"圣都是什么？"
 Yuzu_abyss_crisis_event.99.c.response:0"装傻可救不了尔等……玷污圣都之人将受到教廷的审判。"
 Yuzu_abyss_crisis_event.99.d:0"圣都是什么？"
 Yuzu_abyss_crisis_event.99.d.response:0"尔等是在装傻，还是没人告诉尔等？不过无所谓，这片星系的生命都将被一视同仁地清除。"
 Yuzu_abyss_crisis_event.99.e:0"你们不会成功的！"
 Yuzu_abyss_crisis_event.99.e.response:0"狂妄。"
 Yuzu_abyss_crisis_event.100.desc_01:0"……祭品居然也敢与吾等对话？"
 Yuzu_abyss_crisis_event.100.desc_02:0"蝼蚁……"
 Yuzu_abyss_crisis_event.100.a:0"你们是谁？"
 Yuzu_abyss_crisis_event.100.a.response:0"吾等乃深渊教廷，深渊的选民，星空的主宰。"
 Yuzu_abyss_crisis_event.100.b:0"你们到底想做什么？"
 Yuzu_abyss_crisis_event.100.b.response:0"取回圣都，重建教廷。吾等不过是在清理挡路的石子。"
 Yuzu_abyss_crisis_event.100.c:0"祭品是什么意思？"
 Yuzu_abyss_crisis_event.100.c.response:0"为了重获力量，尔等的血肉将被献给神灵，这是尔等的荣幸。"
 Yuzu_abyss_crisis_event.100.d:0"我们不能和平共处吗？"
 Yuzu_abyss_crisis_event.100.d.response:0"下等生物只配成为祭品。"
 Yuzu_abyss_crisis_event.100.e:0"你们不会成功的！"
 Yuzu_abyss_crisis_event.100.e.response:0"哼，即使吾等的力量百不存一，碾碎尔等也是轻而易举。"
 Yuzu_abyss_crisis_event.100.f:0"你们的时代已经过去了！"
 Yuzu_abyss_crisis_event.100.f.response:0"深渊教廷，荣光永存。"
 Yuzu_abyss_crisis_event.100.g:0"我们将粉碎你们的教廷，让它彻底消失！"
 Yuzu_abyss_crisis_event.100.g.response:0"哈，好久没听到这么好笑的笑话了。"
 
 Yuzu_abyss_crisis_event.107.desc:0"不，神罚军怎么会……不可能！那是什么东西！？"
 Yuzu_abyss_crisis_event.107.a:0"让你知道我们的厉害！"
 Yuzu_abyss_crisis_event.108.desc:0"不要以为这样就能打败吾等……！吾等会用你们整个星系的生命的鲜血来祭奠吾等死去的同胞。"
 Yuzu_abyss_crisis_event.108.a:0"你们的末日就要到了！"
 Yuzu_abyss_crisis_event.109.name:0"教廷神罚军"
 Yuzu_abyss_crisis_event.109.desc:0"我们的传感器显示，在深渊教廷圣堂周围的虚空中出现了一只极为强大的舰队，其无形的恐怖威压令人心颤。本来向着我们倾斜的胜利天平似乎要在瞬间被逆转。\n\n有消息称，这支舰队名为教廷神罚军，其司令自称深渊教廷审判长。这似乎是深渊教廷隐藏的底牌。"
 Yuzu_abyss_crisis_event.109.a:0"不太妙。"
 Yuzu_abyss_crisis_event.109.b:0"我们能战胜它吗？"
 Yuzu_abyss_crisis_event.112.name:0"跃迁反制"
 Yuzu_abyss_crisis_event.112.desc:0"在我们的舰队跃迁到达[yuzu_mia_system.GetName]星系的瞬间，本应平复下去的空间波动突然反向聚集，将舰队卷入了未知的空间。\n\n看来深渊教廷拥有某种反制跃迁的手段，我们想要进入他们境内的星系只能通过其他途径了。"
 Yuzu_abyss_crisis_event.112.a:0"可恶。"
 
 Yuzu_abyss_crisis_event.201.name:0"星河守护者"
 Yuzu_abyss_crisis_event.201.desc:0"即使是偏安一隅的先祖帝国也没有忽视这样一个威胁到整个星系的危机。尽管他们之前对星系事务毫无兴趣，这一坏消息还是引起了§H[From.GetSpeciesName]§!的一阵忙乱。起初，他们只是派出了一些侦查船，也许是为了核实情况的严重性。但接下来传来了[From.GetSpeciesName]舰队聚集在边境，以准备抵抗即将到来的风暴的报告。\n\n现在，§H[From.GetName]§!已经从自我孤立的状态完全转变成为了领导全星系防御的角色。他们正式宣布自己为一个§H泛星系防卫联盟§!的领袖并向所有“下等”种族发出了邀请，希望他们放下仇恨并加入联盟来击退这一对星系中所有开智生命造成威胁的外宇宙敌人。"
 Yuzu_abyss_crisis_event.201.a:0"他们能拯救我们吗？"
 Yuzu_abyss_crisis_event.201.b:0"我们不需要他们！"
 Yuzu_abyss_crisis_event.202.name:0"睡狮的苏醒"
 Yuzu_abyss_crisis_event.202.desc:0"即使是偏安一隅的圣地守护者也没有忽视这样一个威胁到整个星系的危机。尽管他们之前对星系事务毫无兴趣，这一坏消息还是引起了§H[From.GetSpeciesName]§!的一阵忙乱。起初，他们只是派出了一些侦查船，也许是为了核实情况的严重性。但接下来,他们向全星系发出通告，声称他们绝不允许这些万恶的邪教徒玷污自己神圣的领土。\n\n现在，在[From.GetSpeciesName]空间，舰队正在集结，军队已经下达了征召令，那些古老的工厂再一次发出轰鸣声。几百年来第一次，§H[From.GetName]§!开始将他们的目光投注到边境线外广大的星系。\n\n破败的船坞再一次得到修复与调整，一度沉寂的泰坦巨舰铸造厂重新上线，§H[From.GetName]§!已经从自我孤立的状态完全转变为最高战备状态，并开始着手对抗这一对星系中所有开智生命造成威胁的外宇宙邪教徒。"
 Yuzu_abyss_crisis_event.202.a:0"他们能抵挡住教廷吗？"
 Yuzu_abyss_crisis_event.202.b:0"让我们拭目以待。"
 Yuzu_abyss_crisis_event.203.name:0 "睡狮的苏醒"
 Yuzu_abyss_crisis_event.203.desc:0 "即使是偏安一隅的军事孤立者也没有忽视这样一个威胁到整个星系的危机。尽管他们之前对星系事务毫无兴趣，这一坏消息还是引起了§H[From.GetSpeciesName]§!的一阵忙乱。起初，他们只是派出了一些侦查船，也许是为了核实情况的严重性。但接下来我们得知[From.GetSpeciesName]已经整装待发，他们恢复了调查信标的数据链，并重新启用了那些在他们退缩到目前边境之时废弃的侦察哨站。情报显示，他们的意图是重新回到星系这张大棋盘上。\n\n在[From.GetSpeciesName]空间，舰队正在集结，军队已经下达了征召令，那些古老的工厂再一次发出轰鸣声。几百年来第一次，§H[From.GetName]§!开始将他们的目光投注到边境线外广大的星系。\n\n破败的船坞再一次得到修复与调整，一度沉寂的泰坦巨舰铸造厂重新上线。现在，整个星系都在思考，他们究竟是想要与我们一同抗击这外宇宙的入侵者，还是单纯地想要自保呢？"
 Yuzu_abyss_crisis_event.203.a:0"他们会帮助我们吗？"
 Yuzu_abyss_crisis_event.203.b:0"希望他们别添乱。"
 Yuzu_abyss_crisis_event.500.a.desc:0"不可能……不可能……！伟大的教廷怎么可能会失败……吾等本应是宇宙的主宰……\n\n要是当初的仪式没有失败……要是族人们那时都能活下来……要是能找到祭司长……"
 Yuzu_abyss_crisis_event.500.b.desc:0"不可能……不可能……！伟大的教廷怎么可能会失败……吾等本应是宇宙的主宰……\n\n要是当初的仪式没有失败……要是族人们那时都能活下来……要是能找到祭司长……要是没有那把刀……"
 Yuzu_abyss_crisis_event.500.a:0"你们罪有应得。"
 Yuzu_abyss_crisis_event.500.b:0"教廷早已毁灭，你们不过是残留的亡魂。"
 Yuzu_abyss_crisis_event.500.c:0"没有什么如果。"
 Yuzu_abyss_crisis_event.500.d:0"你们早已被神抛弃。"
 Yuzu_abyss_crisis_event.500.e:0"你们该与你们的族人见面了。"
 Yuzu_abyss_crisis_event.503.name:0"教廷陨落"
 Yuzu_abyss_crisis_event.503.desc:0"随着深渊教廷的所有武装力量都被摧毁，整个宇宙都松了一口气。他们的入侵已经完全失败，曾经在另一个宇宙无比辉煌的深渊教廷最终彻底陨落在了这里。\n\n轻松与愉快的气息以超光速散播到整个宇宙，无数星球都开始自发举办活动庆祝这一伟大胜利。也许，我们可以借助这一契机，翻开宇宙和平稳定的新篇章？"
 Yuzu_abyss_crisis_event.503.a:0 "但愿如此。"