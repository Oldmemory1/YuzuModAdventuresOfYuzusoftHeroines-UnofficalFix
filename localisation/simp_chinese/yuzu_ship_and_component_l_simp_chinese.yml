 PLANET_KILLER_STAR_CRACKER_YUZU_DESC:1 "一束定向的快子能量被注入到这颗恒星，引发了一次超新星爆炸。§R这次事件释放的巨额能量会使得恒星系内的所有殖民地，巨型结构和空间站都被摧毁。只有$tech_yuzu_star_eater$能够幸免于难。§!"
