 auth_Yuzu:0"协商制"
 auth_Yuzu_desc:0"国家由全体人民推举出的管理者进行管理。管理者会充分考虑人民的意见并做出决策，尽量照顾所有的人。……真的有国家能做到吗？"
 AUTHORITY_ELECTION_YUZU:0"随时可以选出下一任统治者，若不进行选举则领导人不更换。"
 gov_Yuzu:0"柚子协商制"
 gov_Yuzu_desc:0"柚子协商制是全体柚子社女孩们对国家进行协商管理的制度，由全体女孩们推举出的管理者担任最高决策人，管理者会充分考虑所有人的意见并进行协商，最终做出决策。"
