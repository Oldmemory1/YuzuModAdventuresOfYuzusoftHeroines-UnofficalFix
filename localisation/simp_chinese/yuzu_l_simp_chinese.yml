 civic_yuzu_supernatural_research:0"超自然研究"
 civic_yuzu_supernatural_research_desc:0"离奇的穿越！面对这史上最大规模的超自然现象，以及之后遇到的种种奇异事件，是时候将超自然研究正式纳入专业研究领域了！顺带一提，仍然接受人生咨询。"
 civic_yuzu_supernatural_research_effects:0"£building£§Y$building_yuzu_supernatural_research_organization$§!额外增加星球上岗位生产的 $r_research$\n来自£job_supernatural_researcher£$job_supernatural_researcher_plural$的 £physics£ £society£ £engineering£ 研究点数: §G+2§!"

