 councilor_yuzu_win_the_hearts_desc:0 "$TITLE$负责宣传柚子社的全新作品。"
 councilor_yuzu_win_the_hearts_custom_modifier_desc:1 "§Y$civic_yuzu_win_the_hearts$§!对附庸的加成提升§G5%§!"

 YUZU_SPATIOTEMPORAL_CRACK:0"时空裂缝"
 YUZU_SPATIOTEMPORAL_CRACK_DESC:0"失去了神话生物维持的时空裂缝正在愈合，我们的一些科学家提议，趁着时空裂缝还没消失，应该抓紧时间进行研究。"
 yuzu_spatiotemporal_crack_modifiers:0"时空的见解"
 yuzu_mythical_creature_power:0"神话生物之力"
 YUZU_REPAIR_ABYSS_GATE:0"修复深渊之门"
 YUZU_REPAIR_ABYSS_GATE_DESC:0"在重建[Root.GetName]的过程中，我们发现了一个神秘的大型装置，似乎叫做深渊之门。按照这个星球上的典籍记载，这似乎是用来沟通深渊的装置。该装置的构造过于复杂，普通方式无法修复，我们的科学家提议派出专业的科研团队进行修复。"
 YUZU_PREVENT_ABYSS_INFILTRATION:0"阻止深渊侵蚀"
 YUZU_PREVENT_ABYSS_INFILTRATION_DESC:0"深渊之息从[Root.GetName]的深渊之门中一刻不断地涌出，周围的浓度高到我们最先进的防护装置也挡不住超过10秒。虽然弥漫开来后它的浓度有所下降，不至于对星球上的人们造成致命威胁，但是若不解决，人们将每天都得穿着厚厚的防护服，工作和生活也将收到严重的影响。"

