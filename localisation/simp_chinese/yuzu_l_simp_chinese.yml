 civic_yuzu_social_talent:0"社交达人"
 civic_yuzu_social_talent_desc:0"这个社会中有许多人十分善于人际交流，她们也将其活用于星际事务中。"

 councilor_yuzu_social_talent:0 "亲善大使"
