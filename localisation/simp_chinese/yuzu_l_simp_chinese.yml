 civic_yuzu_win_the_hearts:0"人心所向"
 civic_yuzu_win_the_hearts_desc:0"女孩们的理想与魅力深深地折服了她们的追随者，他们愿意尽全力来帮助女孩们实现她们的梦想。顺带一提，其中的狂热者们似乎称自己为“柚子厨”。"
 civic_tooltip_yuzu_win_the_hearts_effects:0"附庸获得：\n\t\t\t\t$MOD_MONTHLY_LOYALTY_GAIN$:§G+5§!\n\t\t\t\t$mod_planet_jobs_produces_mult$:§G+25%§!\n\t\t\t\t$mod_stations_produces_mult$:§G+25%§!\n\t\t\t\t$MOD_POP_HAPPINESS$:§G+5%§!\n提升附庸对宗主的评价\n§H解锁法令：§!$opinion_yuzu_share_techs$"
 yuzu_win_the_hearts:0"人心所向"

 councilor_yuzu_win_the_hearts:0 "宣传部长"
