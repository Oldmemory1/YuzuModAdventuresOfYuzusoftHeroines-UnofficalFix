 yuzu_sol_system_initializer_DESC:0"这将是选择柚子世界起源时的起始恒星系。"
 
 r_murasamemaru:0"丛雨丸"
 r_murasamemaru_desc:0"神刀丛雨丸，与丛雨一同来到这个世界，刀的能力似乎也发生了些变化……？"
 relic_murasamemaru_active:0"摧毁境内所有敌对舰船。"
 r_silver_key:0"银钥匙"
 r_silver_key_desc:0"从深渊教廷遗迹中发掘出的一把银钥匙，似乎拥有穿越时空的能力。"
 relic_silver_key_active:0"打开时空通道，随机召唤一支舰队。"
 
 fragment_of_heart:0"心之碎片"
 fragment_of_heart_desc:0"心之碎片是以"人心的碎片"喜怒哀乐为首的强烈感情的一部分。"

 tr_expansion_a_new_life_yuzu:0"克隆加速"
 tr_expansion_a_new_life_yuzu_desc:3 "£pops£ §Y$MOD_PLANET_POP_ASSEMBLY_ORGANIC_MULT$§!增加§G+10%§!。"
 tr_expansion_a_new_life_yuzu_delayed:0"想要发展好一个星际帝国，人口不多可不行。我们得加把劲了！"

 tradition_yuzu_festival:0 "祭典"
 tradition_yuzu_festival_desc:0 "各种各样的祭典是我们日常生活的重要组成部分。"
 tr_yuzu_festival_adopt:0"祭典传统"
 tr_yuzu_festival_finish:0"祭典传统完成"
 tr_yuzu_festival_dance:0"神乐舞"
 tr_yuzu_festival_dance_delayed:0"神乐舞是祓除污秽的仪式。代代朝武家的公主通过奉纳舞蹈，来祓除穗织土地上的污秽。在没有污秽需要祓除的现在，这种舞蹈似乎能够带来丰收。"
 tr_yuzu_festival_murasamemaru:0"拔刀挑战"
 tr_yuzu_festival_murasamemaru_delayed:0"穗织为吸引游客而在春日祭举办的特殊活动，依靠抽选来决定挑战者，目标是拔出建实神社供奉的插在石头上的御神刀“丛雨丸”，只有天选之人才能将此刀拔出。现在这项活动的范围已经扩展到了全国各地，各个祭典举办方将仿制丛雨丸插在石头上，石头内部有着复杂而巧妙的机关，拔刀者需要凭借特殊的技巧才能将刀拔出，成功拔刀者可以将刀带走并被认为获得了神明的认可，日后将会一帆风顺。每次祭典举办，各个举办方都会绞尽脑汁来设计全新的机关。"
 tr_yuzu_festival_spring:0"春日祭"
 tr_yuzu_festival_spring_delayed:0"穗织为庆祝战国时代一场战争的胜利而诞生的祭典，现在已经演变为全国范围的重要祭典。祭典举办时街道上人来人往，各种店铺生意兴隆。"
 tr_yuzu_festival_associations:0"社团活动"
 tr_yuzu_festival_associations_desc:0 "£job_yuzu_witch£§Y魔女§!额外产生§Y0.5§!§Y$fragment_of_heart$§!。"
 tr_yuzu_festival_associations_delayed:0"经常开展的社团活动增加了魔女们收集心之碎片的效率。"
 tr_yuzu_festival_school:0"学园祭"
 tr_yuzu_festival_school_delayed:0"由学生会主办，学校各个班级或社团展示自己的祭典。祭典的活动完全是学生自己创办的，能够大幅提高学生们的创造性。在学园祭当天，校外人员也可以参加。"
 
 site_yuzu_land_of_space_time_chaos:0"错乱之地"
 site_yuzu_land_of_space_time_chaos_desc:0"一片荒凉的土地，零星建筑物散布其上，透露出些许违和感。据丛雨所说，丛雨丸就在这里。"
 site_yuzu_land_of_ceremony:0"仪式遗迹"
 site_yuzu_land_of_ceremony_desc:0"可怕的神话生物下方的星球，我们的科学家根据时空波动判断它就是某种禁忌仪式曾经的举行场所。\n\n一望无际的理想城废墟覆盖在这个庞大的星球上，每一座失落的古城都在诉说着它往日的辉煌。这里究竟埋葬了怎样的历史？"
 
 COUNTRY_BROKEN_ABYSS_EMPIRE:0"破落教廷"
 COUNTRY_BROKEN_ABYSS_EMPIRE_DESC:0"破落教廷是由原先的深渊教廷中极少数幸存者在漫长的岁月中重建而成的新教廷，妄图恢复往日的荣光。尽管教廷的绝大部分科技与财富已经遗失，实力百不存一，但对我们这片星系仍有着致命的威胁。"

 new_abyss_empire_official:0"$official$"
 new_abyss_empire_scientist:0"$scientist$"
 new_abyss_empire_commander:0"$commander$"
 
 YUZU_WEREWOLF_PROJECT:0"分析人造狼人实验资料"
 YUZU_WEREWOLF_PROJECT_DESC:0"我们将分析人造狼人的实验资料，获取对我们有用的信息。"
 yuzu_werewolf_project_modifier:0"人造狼人资料分析"
 tech_yuzu_werewolf:0"人造狼人"
 tech_yuzu_werewolf_desc:0"通过对人体的基因改造，我们可以将其转化为狼人。狼人是一种更加强大的吸血鬼，能够通过吸食吸血鬼的血液来获得对象的能力。"
 yuzu_werewolf_army:0 "狼人部队"
 yuzu_werewolf_army_plural:1 "狼人军团"
 yuzu_werewolf_army_desc:0 " 从传统的部队里招募精英将其改造为狼人，并从全国吸血鬼志愿者捐献的吸血鬼血液库中挑选出上万种血液使其吸食。每一名狼人都精通上万种不同的能力，是近乎全能的超人。"

 
 gateway_yuzu_memory:0 "§H记忆之道§!\n§E此科技将进一步推进记忆领域的科技发展。§!"
 gateway_yuzu_space_time:0 "§H时空之道§!\n§E此科技将进一步推进时空领域的科技发展。§!"
 gateway_yuzu_abyss:0 "§H深渊之道§!\n§E此科技将进一步推进深渊领域的科技发展。§!"
 tech_yuzu_space_time_theory:0"新时空理论"
 tech_yuzu_space_time_theory_desc:0"对时空乱流的研究让我们对时空的本质有了颠覆性的全新认知。"
 tech_yuzu_all_in_one_theory:0"万物归一理论"
 tech_yuzu_all_in_one_theory_desc:0"我们所属的宇宙仅仅只是一个渺小事物上的一个微小统一体。每一个存在的所有时间阶段全都仅仅只是一个超越了所有维度的永恒存在所投下的倒影而已，而所有的永恒存在似乎都是一个不可名状的无限存在的一部分。"
 tech_spatiotemporal_communication:0"舰队超时空通讯"
 tech_spatiotemporal_communication_desc:0"通过对时空变化的理解，我们将能够无视时空的距离即时在舰队之间通讯。"
 #TECH_SPATIOTEMPORAL_COMMUNICATION_TITLE:0"§Y主宰§!和§Y巨像§!上限§G+1§!"
 #TECH_SPATIOTEMPORAL_COMMUNICATION_DESC:0"通过对时空变化的理解，我们将能够无视时空的距离即时在舰队之间通讯,就连主宰和巨像这种工作起来十分复杂的庞然大物也能指挥得井井有条。"
 tech_ceremony_communication:0"舰队仪式通讯"
 tech_ceremony_communication_desc:0"通过某种古老的仪式，我们能够将人员直接投影到舰船内部身临其境地进行协助。"
 #TECH_CEREMONY_COMMUNICATION_TITLE:0"§Y主宰§!和§Y巨像§!上限§G+1§!"
 #TECH_CEREMONY_COMMUNICATION_DESC:0"通过某种古老的仪式，我们能够将人员直接投影到舰船内部身临其境地进行协助,就连主宰和巨像这种工作起来十分复杂的庞然大物也能指挥得井井有条。"
 
 tech_memory_storage:0"记忆存储"
 tech_memory_storage_desc:0"在城门翼的帮助下，我们可以复现出存储记忆的技术，这将有效改善我们学习的效率。"
 tech_BMI:0"BMI技术"
 tech_BMI_desc:0"Brain-machine Interface，简称BMI，是一种连接大脑和机器的技术，凭借城门翼的力量得以在这个世界复现。这项技术让记忆得以数据化，可以在人与人之间传递，显著降低了高技术力工作的门槛。"
 TECH_UNLOCK_YUZU_MEMORY_TRANSMISSION_TITLE:0"§H解锁特性：§!记忆传递"
 TECH_UNLOCK_YUZU_MEMORY_TRANSMISSION_DESC:0"§H记忆传递§!\n允许我们进行领袖间的记忆传递，使得领袖的等级至多比该类别领袖曾达到过的最高等级低1级。"
 ap_personality_transplantation:0"人格移植"
 ap_personality_transplantation_desc:0"BMI技术的日渐成熟使我们能够进行无副作用的人格移植。配合广泛使用的克隆技术，我们将摆脱自然寿命的限制。"
 enable_yuzu_immortal_leaders:0"拥有§Y柚子§!特质的领袖获得§G不朽§!。"
 enable_yuzu_clone:0"£building£§Y$building_yuzu_clone_vats$§!额外提供§G+5§!§Y稳定度§!。"
 requires_tech_BMI:1 "$TRIGGER_FAIL$需要£society£§Y$tech_BMI$§!科技。"
 tech_yuzu_rapid_cell_division_1:0"细胞分裂催化剂"
 tech_yuzu_rapid_cell_division_1_desc:0"研制出的新型催化剂将能使细胞在克隆时更加快速地进行分裂。"
 TECH_YUZU_RAPID_CELL_DIVISION_1_TITLE:0"£building£§Y$building_yuzu_clone_vats$§!提供的§Y$MOD_PLANET_POP_ASSEMBLY_ORGANIC_ADD$§!:§G+1§!。"
 TECH_YUZU_RAPID_CELL_DIVISION_1_DESC:0"$tech_yuzu_rapid_cell_division_1_desc$"
 tech_yuzu_rapid_cell_division_2:0"细胞分裂加速立场"
 tech_yuzu_rapid_cell_division_2_desc:0"精心设计的时间加速立场能够在最大限度保证细胞活性的情况下加快克隆时细胞的分裂速度。"
 TECH_YUZU_RAPID_CELL_DIVISION_2_TITLE:0"£building£§Y$building_yuzu_clone_vats$§!提供的§Y$MOD_PLANET_POP_ASSEMBLY_ORGANIC_ADD$§!:§G+1§!。"
 TECH_YUZU_RAPID_CELL_DIVISION_2_DESC:0"$tech_yuzu_rapid_cell_division_2_desc$"
 
 ap_stare_abyss:0"凝视深渊"
 ap_stare_abyss_desc:0"通过对深渊教廷遗迹的发掘，我们将有能力复现他们的的部分科技。现在，是时候让这个星系感受深渊的气息了。"
 enable_stare_abyss:0 "§H发布特殊项目：§!凝视深渊\n\n"
 describe_stare_abyss:0 "完成§Y凝视深渊§!，能够解锁§R深渊教廷§!的部分科技。"
 requires_tech_yuzu_all_in_one_theory:1"$TRIGGER_FAIL$需要£physics£§Y$tech_yuzu_all_in_one_theory$§!科技。"
 YUZU_ABYSS_PROJECT:"凝视深渊"
 YUZU_ABYSS_PROJECT_DESC:"我们将深入理解那些深埋在深渊教廷遗址下的秘密，让这些禁忌的知识重新展现在我们眼前。"
 
 tech_yuzu_mega_engineering:0"深渊巨构建造仪式"
 tech_yuzu_mega_engineering_desc:0"通过举行特定的大型仪式，我们将能够不借助其他辅助凭空移动巨型结构的部件。这将大幅增加巨型结构的建造速度并节约大量人力物力。"

 
 yuzu_abyss_coming_chain_title:0"跨越时空的降临者"
 yuzu_abyss_coming_chain_desc:0"我们检测到了一股异常庞大的时空波动,也许有什么东西要来了……"
 yuzu_abyss_descended_chain_title:0"深渊降临"
 yuzu_abyss_descended_chain_desc:0"深渊教廷的残存势力跨越重重宇宙降临到了我们的星系，他们试图夺回他们曾经的圣都并献祭整个星系的智慧生命以恢复力量。"
 abyss_vanguard_fleet:0"教廷搜查队"
 yuzu_abyss_descended_1_poi:0"教廷搜查队"
 yuzu_abyss_descended_1_poi_desc:0"自称教廷第7搜查队的舰队，似乎在发送什么坐标。"
 abyss_capital:0"圣堂"
 yuzu_abyss_descended_2_poi:0"圣堂"
 yuzu_abyss_descended_2_poi_desc:0"深渊教廷的首都星球就在这里，在这个似乎是穿越时空从其他宇宙而来的恒星系。"
 abyss_presiding_judge_fleet:0"教廷神罚军"
 yuzu_abyss_descended_3_poi:0"教廷神罚军"
 yuzu_abyss_descended_3_poi_desc:0"似乎是被深渊教廷作为底牌的舰队，能否击败它直接决定了战争的走向。"
 yuzu_abyss_kills_us:0 "§G被我方消灭的深渊教廷舰船§!"
 yuzu_abyss_kills_others:0 "§G被其他势力消灭的深渊教廷舰船§!"
 yuzu_abyss_victims:0 "§R被献祭舰船§!"
 yuzu_abyss_sacrificed_planets:0 "§R被献祭星球§!"

 yuzu_abyss_starbase_modifier:0"深渊加护"

 resolution_galactic_focus_crisis_yuzu_abyss:0 "焦点：深渊教廷"
 resolution_galactic_focus_crisis_yuzu_abyss_desc:0 "深渊教廷的降临对于整个星系的生命体都是威胁。如果我们不团结一致阻止他们，他们就会将我们屠杀殆尽。我们应该通过星系焦点处理这一危机。"
