 trait_yuzu:0 "柚子"
 trait_yuzu_desc:0 "§L柚子社的美丽少女，非常可爱。§!"
 trait_yuzu_astral:0"星幽使"
 trait_yuzu_astral_desc:0"§L能够透过星幽子使用星幽术的人。星幽术是星幽使利用星幽子所施展的能力，每个星幽使能使用的星幽术类型都是固定的，但在不同环境下星幽术的效果也有可能会有差异。星际时代人们普遍接受着星幽术带来的便利。§!"
 trait_yuzu_vampire:0"吸血鬼"
 trait_yuzu_vampire_desc:0"§L外表和人类几乎相同，但吸血鬼拥有比人类更强大的身体能力和感觉，并且作息节律与人类相反，昼伏夜出。吸血鬼拥有被称为“吸血鬼病毒”的特殊因子，在吸取人类的血液后，各种身体机能都会大幅上升，也能够使用“能力”——由于吸取人类血液后，吸血鬼病毒活性化所拥有的超能力。每个吸血鬼所拥有的能力的型态和模样及运用方式都不尽相同。日光和海水是吸血鬼的弱点，或多或少对身体产生不好的影响。§!"
 trait_yuzu_ciallo:0"Ciallo～"
 trait_yuzu_ciallo_desc:0"§L柚子社的女孩们似乎喜欢用"Ciallo～"来打招呼。§!"
 trait_yuzu_big_eater:0"大胃王"
 trait_yuzu_big_eater_desc:0"§L面硬加咸蔬菜加倍蒜末和油多多！……她究竟是怎么吃完的。§!"
 trait_yuzu_vampire_tooltip:2 "非§Y海洋§!星球或§Y洪潮居住站§!的§Y潮湿§!星球宜居性额外§R-5%§!\n§Y海洋§!星球和§Y洪潮居住站§!宜居性额外§R-10%§!"
 
